<!DOCTYPE html>
<html lang="en-CA">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solum Energy Blog Dashboard</title>
<style>
  :root{ color-scheme: light;
    --forest:#1a3d35; --forest-deep:#12302a; --emerald:#2f7f60; --green:#70bf70;
    --sage:#9ac9ad; --mint:#e7f3ea; --paper:#f5f8f4; --paper-2:#eef4ec;
    --ink:#15241f; --slate:#516159; --line:#d9e2db; --white:#ffffff;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'IBM Plex Mono',ui-monospace,Menlo,Consolas,monospace;}
  .wrap{max-width:880px;margin:0 auto;padding:28px 22px 60px;}
  header.top{border-bottom:2px solid var(--forest);padding-bottom:18px;margin-bottom:8px;}
  .brandrow{display:flex;align-items:center;gap:12px;}
  .logo{width:34px;height:34px;border-radius:8px;background:var(--forest);display:grid;place-items:center;
    color:var(--white);font-weight:800;font-size:17px;flex:none;}
  h1{font-size:23px;margin:0;color:var(--forest);letter-spacing:-.01em;}
  .sub{margin:6px 0 0;color:var(--slate);font-size:14px;}
  .count{margin-top:16px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--emerald);font-weight:600;}
  .card{position:relative;background:var(--white);border:1px solid var(--line);border-radius:14px;
    padding:22px 24px;margin-top:20px;box-shadow:0 1px 2px rgba(20,40,30,.04);}
  .status{position:absolute;top:18px;right:20px;display:inline-flex;align-items:center;gap:7px;
    font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    padding:6px 12px;border-radius:999px;cursor:pointer;border:1px solid transparent;
    font-family:inherit;transition:background .15s,color .15s,border-color .15s;}
  .status .dot{width:8px;height:8px;border-radius:50%;flex:none;}
  .status[data-state="posted"]{background:var(--mint);color:var(--emerald);border-color:#bfe0c9;}
  .status[data-state="posted"] .dot{background:var(--emerald);}
  .status[data-state="draft"]{background:#fbf1e4;color:#a45a1e;border-color:#f0dcc2;}
  .status[data-state="draft"] .dot{background:#c98a3a;}
  .status:hover{filter:brightness(.97);}
  .card .meta,.card h2,.card .summary{padding-right:96px;}
  .meta{display:flex;flex-wrap:wrap;gap:10px;align-items:center;font-size:12px;color:var(--slate);}
  .cat{background:var(--mint);color:var(--emerald);font-weight:600;letter-spacing:.08em;
    text-transform:uppercase;font-size:10.5px;padding:4px 10px;border-radius:999px;}
  .test-tag{background:#fbece0;color:#a45a1e;font-weight:600;letter-spacing:.06em;
    text-transform:uppercase;font-size:10.5px;padding:4px 10px;border-radius:999px;}
  h2{font-size:19px;margin:12px 0 8px;color:var(--forest);line-height:1.25;letter-spacing:-.01em;}
  .summary{color:var(--ink);font-size:15px;margin:0 0 16px;}
  .actions{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px;}
  .btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;
    text-decoration:none;border-radius:8px;padding:9px 15px;cursor:pointer;border:1px solid transparent;font-family:inherit;}
  .btn-primary{background:var(--forest);color:var(--white);}
  .btn-primary:hover{background:var(--forest-deep);}
  details{margin-top:14px;border-top:1px solid var(--line);padding-top:12px;}
  summary{cursor:pointer;font-weight:600;font-size:13px;color:var(--forest);list-style:none;display:flex;align-items:center;gap:8px;}
  summary::-webkit-details-marker{display:none;}
  summary .chev{transition:transform .2s;color:var(--emerald);}
  details[open] summary .chev{transform:rotate(90deg);}
  .li-box{position:relative;margin-top:12px;background:var(--paper-2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;}
  .li-text{white-space:pre-wrap;font-size:13.5px;color:var(--ink);margin:0;}
  .copy{position:absolute;top:10px;right:10px;font-size:11.5px;font-weight:600;padding:5px 10px;
    border-radius:7px;border:1px solid var(--line);background:var(--white);color:var(--emerald);cursor:pointer;}
  .copy:hover{border-color:var(--emerald);}
  .copy.done{background:var(--emerald);color:var(--white);border-color:var(--emerald);}
  ul.src{margin:12px 0 0;padding-left:18px;}
  ul.src li{font-size:13px;color:var(--slate);margin-bottom:7px;}
  ul.src a{color:var(--emerald);text-decoration:underline;text-underline-offset:2px;word-break:break-word;}
  footer.foot{margin-top:34px;text-align:center;font-size:12px;color:var(--slate);}
  .modal{position:fixed;inset:0;background:rgba(18,40,30,.55);display:none;z-index:50;padding:24px;}
  .modal.open{display:flex;align-items:center;justify-content:center;}
  .modal-inner{background:var(--white);border-radius:14px;width:100%;max-width:1040px;height:100%;
    display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(12,40,32,.4);}
  .modal-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:12px 16px;border-bottom:1px solid var(--line);background:var(--paper);}
  .modal-bar .t{font-size:13px;font-weight:600;color:var(--forest);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .modal-bar .x{background:var(--forest);color:var(--white);border:none;border-radius:8px;
    font-size:13px;font-weight:600;padding:8px 14px;cursor:pointer;flex:none;}
  .modal iframe{border:0;width:100%;flex:1;background:#fff;}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brandrow">
      <div class="logo">S</div>
      <div>
        <h1>Solum Energy Blog Dashboard</h1>
        <p class="sub">Every weekly post in one place: summary, preview, LinkedIn copy, and sources.</p>
      </div>
    </div>
    <div class="count" id="count"></div>
  </header>
  <div id="posts"></div>
  <footer class="foot">Solum Energy &middot; Clean Fuel, Built on Partnership &middot; New posts are added here automatically each week. &middot; Last updated June 29, 2026</footer>
</div>

<div class="modal" id="modal">
  <div class="modal-inner">
    <div class="modal-bar">
      <span class="t" id="modal-title">Preview</span>
      <button class="x" id="modal-close">Close preview</button>
    </div>
    <iframe id="modal-frame" title="Blog preview"></iframe>
  </div>
</div>

<script>
const POSTS = [{"title": "BC asked for 25 percent. First Nations took 51. Clean fuel is the next test.", "category": "Policy & Markets", "date": "June 29, 2026", "url": "https://solumenergy.ca/blog/bc-call-for-power-first-nations-ownership-standard.html", "sources": [{"label": "Strong response to 2025 call for power, delivering clean, affordable energy", "url": "https://news.gov.bc.ca/releases/2026ECS0014-000552"}, {"label": "2025 Call for Power", "url": "https://www.bchydro.com/work-with-us/selling-clean-energy/2025-call-for-power.html"}, {"label": "Tumbler Ridge methanol project and West Moberly First Nations MOU", "url": "https://www.canadianmethanol.com/"}, {"label": "Government announces largest Indigenous loan guarantee in Canadian history to support Darlington New Nuclear Project", "url": "https://www.canada.ca/en/department-finance/news/2026/06/government-announces-largest-indigenous-loan-guarantee-in-canadian-history-to-support-darlington-new-nuclear-project.html"}], "slug": "bc-call-for-power-first-nations-ownership-standard", "test": false, "summary": "BC Hydro required a 25 percent First Nations equity minimum in its 2025 call for power. All four winning wind projects came in at 51 percent, more than $2 billion of ownership. Co-ownership is now the standard for electricity, and clean fuel has not been held to it yet.", "linkedin": "BC Hydro set a 25 percent First Nations ownership floor in its 2025 call for power. All four winning wind projects came in at 51 percent, more than $2 billion of First Nations ownership. Co-ownership has become the standard for electricity, but clean fuel has not been held to it yet, even though the feedstock and value sit in the same communities.\n\nRead the full piece: https://solumenergy.ca/blog/bc-call-for-power-first-nations-ownership-standard.html", "preview": "\u003c!DOCTYPE html>\n\u003chtml lang=\"en-CA\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\" />\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n\u003ctitle>BC Asked for 25 Percent. First Nations Took 51. Clean Fuel Is Next. | Solum Energy Blog\u003c/title>\n\u003cmeta name=\"description\" content=\"BC Hydro's 2025 call for power required a 25 percent First Nations equity minimum. All four winning wind projects came in at 51 percent, more than $2 billion of First Nations ownership. Co-ownership is now the competitive standard. Clean fuel has not been held to it yet.\" />\n\u003cmeta name=\"theme-color\" content=\"#1a3d35\" />\n\u003clink rel=\"canonical\" href=\"https://solumenergy.ca/blog/bc-call-for-power-first-nations-ownership-standard.html\" />\n\n\u003clink rel=\"preconnect\" href=\"https://fonts.googleapis.com\" />\n\u003clink rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin />\n\u003clink href=\"https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap\" rel=\"stylesheet\" />\n\u003cstyle>/* ============================================================\n   Solum Energy \u2014 redesign stylesheet\n   Palette: forest #1a3d35 \u00b7 emerald #2f7f60 \u00b7 green #70bf70\n            sage #9ac9ad \u00b7 mint #d9f2db\n   ============================================================ */\n:root{\n  --forest:#1a3d35; --forest-deep:#12302a; --emerald:#2f7f60;\n  --green:#70bf70; --sage:#9ac9ad; --mint:#d9f2db;\n  --paper:#f5f8f4; --paper-2:#eef4ec; --ink:#15241f; --slate:#516159;\n  --line:rgba(26,61,53,.12); --line-soft:rgba(26,61,53,.08);\n  --display:'Schibsted Grotesk',system-ui,sans-serif;\n  --body:'Hanken Grotesk',system-ui,sans-serif;\n  --mono:'IBM Plex Mono',ui-monospace,monospace;\n  --maxw:max(1240px,calc(620px + 50vw)); --gutter:clamp(20px,5vw,64px);\n  --r-lg:24px; --r-md:16px; --r-sm:10px;\n  --shadow:0 18px 50px -20px rgba(12,40,32,.35);\n  --shadow-sm:0 8px 24px -12px rgba(12,40,32,.28);\n}\n*{box-sizing:border-box;}\nhtml{scroll-behavior:smooth;scroll-padding-top:92px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}\nbody{margin:0;font-family:var(--body);color:var(--ink);background:var(--paper);font-size:17px;line-height:1.6;overflow-x:hidden;}\nimg{max-width:100%;display:block;}\na{color:inherit;text-decoration:none;}\nh1,h2,h3,h4{font-family:var(--display);font-weight:700;letter-spacing:-0.025em;line-height:1.04;margin:0;text-wrap:balance;color:var(--forest);}\np{margin:0;text-wrap:pretty;}\n::selection{background:var(--sage);color:var(--forest-deep);}\n\n/* ---------- shared layout ---------- */\n.wrap{max-width:var(--maxw);margin-inline:auto;padding-inline:var(--gutter);}\n.eyebrow{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--emerald);display:inline-flex;align-items:center;gap:10px;}\n.eyebrow::before{content:\"\";width:22px;height:1.5px;background:var(--green);display:inline-block;}\n.eyebrow.center{justify-content:center;}\n.section{padding:clamp(72px,11vw,140px) 0;position:relative;}\n.section-head{max-width:62ch;}\n.section-head h2{font-size:clamp(32px,4.6vw,52px);margin-top:22px;}\n.section-head p{font-size:clamp(17px,2vw,20px);color:var(--slate);margin-top:22px;max-width:54ch;}\n.lead{font-size:clamp(18px,2.2vw,21px);color:var(--slate);}\n\n/* ---------- buttons ---------- */\n.btn{font-family:var(--body);font-weight:600;font-size:15.5px;border-radius:999px;padding:14px 26px;display:inline-flex;align-items:center;gap:9px;cursor:pointer;border:1.5px solid transparent;transition:transform .2s,box-shadow .2s,background .2s,color .2s,border-color .2s;white-space:nowrap;}\n.btn .arr{transition:transform .2s;}\n.btn:hover .arr{transform:translateX(4px);}\n.btn-primary{background:var(--forest);color:#fff;}\n.btn-primary:hover{background:var(--forest-deep);transform:translateY(-2px);box-shadow:var(--shadow-sm);}\n.btn-light{background:var(--green);color:var(--forest-deep);}\n.btn-light:hover{background:var(--mint);transform:translateY(-2px);box-shadow:var(--shadow-sm);}\n.btn-ghost{background:transparent;color:var(--forest);border-color:var(--line);}\n.btn-ghost:hover{border-color:var(--emerald);color:var(--emerald);}\n.btn-ghost.on-dark{color:#fff;border-color:rgba(255,255,255,.34);}\n.btn-ghost.on-dark:hover{border-color:#fff;color:var(--mint);}\n\n/* ---------- header / nav ---------- */\n.site-header{position:fixed;inset:0 0 auto 0;z-index:50;transition:background .3s,box-shadow .3s,border-color .3s;border-bottom:1px solid transparent;}\n.site-header.scrolled{background:rgba(245,248,244,.82);backdrop-filter:saturate(1.4) blur(14px);border-bottom-color:var(--line-soft);box-shadow:0 6px 24px -18px rgba(12,40,32,.5);}\n.nav{display:flex;align-items:center;justify-content:space-between;height:148px;transition:height .35s cubic-bezier(.4,0,.2,1);}\n.brand{display:flex;align-items:center;gap:14px;}\n.brand img{height:38px;width:auto;transition:height .35s cubic-bezier(.4,0,.2,1);}\n.brand .wordmark{font-family:var(--display);font-weight:700;font-size:21px;letter-spacing:.08em;color:var(--forest);transition:font-size .35s cubic-bezier(.4,0,.2,1);}\n/* large at the top of the page */\n.site-header .brand img{height:112px;}\n.site-header .brand .wordmark{font-size:28px;}\n/* shrink back to the original size once scrolled */\n.site-header.scrolled .nav{height:76px;}\n.site-header.scrolled .brand img{height:38px;}\n.site-header.scrolled .brand .wordmark{font-size:21px;}\n.nav-links{display:flex;align-items:center;gap:34px;}\n.nav-links a.link{font-size:15.5px;font-weight:500;color:var(--ink);opacity:.82;position:relative;padding:4px 0;transition:opacity .2s,color .2s;}\n.nav-links a.link::after{content:\"\";position:absolute;left:0;right:0;bottom:-2px;height:1.5px;background:var(--emerald);transform:scaleX(0);transform-origin:left;transition:transform .25s;}\n.nav-links a.link:hover{opacity:1;color:var(--emerald);}\n.nav-links a.link:hover::after,.nav-links a.link.active::after{transform:scaleX(1);}\n.nav-links a.link.active{opacity:1;color:var(--emerald);}\n.nav-cta{display:flex;align-items:center;gap:14px;}\n.nav-inline-cta{display:none;}\n.nav-toggle{display:none;background:none;border:none;cursor:pointer;width:42px;height:42px;flex-direction:column;justify-content:center;gap:5px;}\n.nav-toggle span{display:block;height:2px;width:24px;background:var(--forest);border-radius:2px;transition:.25s;}\n\n/* ---------- hero (Direction A) ---------- */\n.hero{padding-top:148px;background:var(--paper);}\n.hero-grid{display:grid;grid-template-columns:1.04fr .96fr;min-height:calc(100svh - 148px);align-items:stretch;}\n.hero-left{display:flex;flex-direction:column;justify-content:center;padding:clamp(40px,6vw,72px) clamp(20px,4vw,40px) clamp(40px,6vw,72px) 0;}\n.hero-left .eyebrow{margin-bottom:26px;}\n.hero h1{font-size:clamp(40px,6vw,70px);max-width:13ch;}\n.hero h1 .accent{color:var(--emerald);}\n.hero-sub{font-size:clamp(17px,2.1vw,20px);color:var(--slate);max-width:46ch;margin:28px 0 36px;}\n.hero-cta{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}\n.hero-stats{display:grid;grid-template-columns:repeat(3,auto);gap:clamp(28px,4vw,48px);margin-top:clamp(40px,6vw,58px);padding-top:30px;border-top:1px solid var(--line);}\n.hero-stats .stat .n{font-family:var(--display);font-weight:700;font-size:clamp(26px,3.4vw,34px);color:var(--forest);letter-spacing:-.02em;}\n.hero-stats .stat .l{font-size:13px;color:var(--slate);margin-top:4px;max-width:18ch;}\n.hero-right{position:relative;overflow:hidden;border-radius:var(--r-lg) 0 0 var(--r-lg);}\n.hero-right img{width:100%;height:100%;object-fit:cover;will-change:transform;}\n.hero-right::after{content:\"\";position:absolute;inset:0;background:linear-gradient(105deg,var(--paper) 0%,rgba(245,248,244,0) 20%);pointer-events:none;}\n.hero-badge{position:absolute;left:26px;bottom:26px;z-index:3;background:rgba(18,48,42,.62);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:var(--r-md);padding:14px 18px;display:flex;align-items:center;gap:13px;max-width:300px;}\n.hero-badge .dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(112,191,112,.3);flex:none;}\n.hero-badge .t{font-size:13.5px;line-height:1.35;}\n.hero-badge .t b{color:var(--mint);font-weight:600;}\n\n/* ---------- logo / context strip ---------- */\n.context-strip{background:var(--forest);color:#fff;}\n.context-strip .wrap{display:flex;align-items:center;gap:clamp(24px,5vw,64px);flex-wrap:wrap;padding-block:26px;justify-content:space-between;}\n.context-strip .item{display:flex;align-items:center;gap:12px;font-size:14.5px;color:rgba(255,255,255,.84);}\n.context-strip .item svg{flex:none;color:var(--green);}\n\n/* ---------- mission ---------- */\n.mission .wrap{display:grid;grid-template-columns:.85fr 1.15fr;gap:clamp(40px,7vw,90px);align-items:start;}\n.mission .big{font-family:var(--display);font-weight:600;font-size:clamp(26px,3.4vw,38px);line-height:1.16;letter-spacing:-.02em;color:var(--forest);text-wrap:balance;}\n.mission .big em{font-style:normal;color:var(--emerald);}\n.mission .body p+p{margin-top:20px;}\n.mission .body .lead{color:var(--slate);}\n.mission .define{margin-top:30px;padding:22px 24px;border:1px solid var(--line);border-radius:var(--r-md);background:#fff;}\n.mission .define .term{font-family:var(--display);font-weight:700;color:var(--forest);font-size:19px;}\n.mission .define .term span{font-family:var(--mono);font-size:12px;color:var(--emerald);letter-spacing:.08em;margin-left:8px;}\n.mission .define p{font-size:15px;color:var(--slate);margin-top:6px;}\n\n/* ---------- pillars ---------- */\n.pillars{background:var(--paper-2);}\n.pillars-intro{display:grid;grid-template-columns:1.1fr .9fr;gap:clamp(32px,5vw,64px);align-items:center;margin-bottom:clamp(8px,2vw,20px);}\n.pillars-intro .section-head{max-width:none;}\n.pillars-intro-media{border-radius:var(--r-lg);overflow:hidden;aspect-ratio:4/3;box-shadow:var(--shadow);}\n.pillars-intro-media img{width:100%;height:100%;object-fit:cover;display:block;}\n.pillar{display:grid;grid-template-columns:1fr 1fr;gap:clamp(36px,6vw,80px);align-items:center;padding:clamp(48px,7vw,80px) 0;border-top:1px solid var(--line);}\n.pillar:first-of-type{border-top:none;}\n.pillar.flip .pillar-media{order:2;}\n.pillar-media{position:relative;border-radius:var(--r-lg);overflow:hidden;aspect-ratio:5/4;box-shadow:var(--shadow);}\n.pillar-media img{width:100%;height:100%;object-fit:cover;will-change:transform;}\n.pillar-media .tag{position:absolute;top:18px;left:18px;background:rgba(18,48,42,.7);backdrop-filter:blur(6px);color:#fff;font-family:var(--mono);font-size:11.5px;letter-spacing:.14em;padding:8px 14px;border-radius:999px;}\n.pillar-num{font-family:var(--mono);font-size:13px;color:var(--emerald);letter-spacing:.2em;}\n.pillar-body h3{font-size:clamp(26px,3.4vw,38px);margin:16px 0 18px;}\n.pillar-body>p{color:var(--slate);font-size:clamp(16px,1.9vw,18.5px);max-width:48ch;}\n.pillar-list{list-style:none;margin:28px 0 0;padding:0;display:grid;gap:2px;}\n.pillar-list li{display:grid;grid-template-columns:auto 1fr;gap:16px;padding:18px 0;border-top:1px solid var(--line);align-items:start;}\n.pillar-list .ic{width:38px;height:38px;border-radius:10px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;color:var(--emerald);flex:none;}\n.pillar-list .ic svg{width:19px;height:19px;}\n.pillar-list h4{font-size:16.5px;font-family:var(--display);color:var(--forest);}\n.pillar-list p{font-size:14.5px;color:var(--slate);margin-top:4px;}\n\n/* ---------- partnership ---------- */\n.partner{background:var(--forest);color:#fff;position:relative;overflow:hidden;}\n.partner .eyebrow{color:var(--green);}\n.partner .eyebrow::before{background:var(--green);}\n.partner h2{color:#fff;}\n.partner .section-head p{color:rgba(255,255,255,.78);}\n.partner .intro{display:grid;grid-template-columns:1fr;gap:clamp(36px,6vw,72px);align-items:end;}\n.partner .intro .equity{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:var(--r-md);padding:26px 28px;}\n.partner .intro .equity .n{font-family:var(--display);font-weight:700;font-size:clamp(40px,6vw,64px);color:var(--green);line-height:1;letter-spacing:-.03em;}\n.partner .intro .equity .l{font-size:15px;color:rgba(255,255,255,.82);margin-top:10px;max-width:30ch;}\n.process{margin-top:clamp(48px,7vw,72px);}\n.process-title{color:#fff;font-size:clamp(20px,2.6vw,26px);font-weight:600;letter-spacing:-.01em;max-width:30ch;margin-bottom:clamp(28px,4vw,40px);}\n.process-track{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;counter-reset:step;}\n.process-step{position:relative;padding-top:34px;}\n.process-step::before{counter-increment:step;content:counter(step,decimal-leading-zero);position:absolute;top:0;left:0;font-family:var(--mono);font-size:12px;color:var(--green);letter-spacing:.1em;}\n.process-step::after{content:\"\";position:absolute;top:6px;left:34px;right:-9px;height:1px;background:linear-gradient(90deg,rgba(112,191,112,.5),rgba(112,191,112,.12));}\n.process-step:last-child::after{display:none;}\n.process-step .dot{position:absolute;top:1px;left:32px;width:11px;height:11px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(112,191,112,.18);}\n.process-step h4{font-size:17px;color:#fff;margin-bottom:8px;}\n.process-step p{font-size:14px;color:rgba(255,255,255,.7);}\n.partner-media{margin-top:clamp(48px,7vw,72px);position:relative;border-radius:var(--r-lg);overflow:hidden;aspect-ratio:21/8;box-shadow:var(--shadow);}\n.partner-media img{width:100%;height:100%;object-fit:cover;will-change:transform;}\n.partner-media .quote{position:absolute;left:0;bottom:0;right:0;padding:clamp(28px,5vw,52px);background:linear-gradient(transparent,rgba(12,40,32,.85));}\n.partner-media .quote p{font-family:var(--display);font-weight:600;font-size:clamp(18px,2.6vw,28px);color:#fff;max-width:24ch;line-height:1.2;letter-spacing:-.02em;}\n.partner-media .quote .who{font-family:var(--mono);font-size:12.5px;color:var(--mint);letter-spacing:.1em;margin-top:14px;}\n\n/* ---------- projects / map ---------- */\n.projects{background:var(--paper);}\n.map-layout{display:flex;justify-content:center;margin-top:clamp(40px,6vw,60px);}\n.map-wrap{position:relative;width:100%;max-width:1080px;aspect-ratio:1/1;}\n.canada-map{width:100%;height:100%;object-fit:contain;display:block;filter:drop-shadow(0 16px 40px rgba(12,40,32,.18));}\n\n/* point markers */\n.poi{position:absolute;width:0;height:0;background:none;border:none;padding:0;cursor:pointer;z-index:2;}\n.poi .pin{position:absolute;left:0;top:0;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:var(--green);border:2.5px solid #fff;box-shadow:0 2px 8px rgba(12,40,32,.45);transition:transform .2s,background .2s,box-shadow .2s;}\n.poi .pin::before{content:\"\";position:absolute;inset:-7px;border-radius:50%;border:2px solid var(--green);opacity:.6;animation:poi-pulse 2.4s ease-out infinite;}\n@keyframes poi-pulse{0%{transform:scale(.6);opacity:.6;}70%{opacity:0;}100%{transform:scale(1.6);opacity:0;}}\n.poi .poi-label{position:absolute;left:16px;top:0;transform:translateY(-50%);font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--forest);background:rgba(245,248,244,.82);padding:2px 7px;border-radius:6px;white-space:nowrap;backdrop-filter:blur(2px);transition:opacity .2s;}\n.poi:hover,.poi:focus-visible,.poi.active{z-index:6;outline:none;}\n.poi:hover .pin,.poi:focus-visible .pin,.poi.active .pin{background:var(--mint);transform:translate(-50%,-50%) scale(1.45);}\n.poi:focus-visible .pin{box-shadow:0 0 0 4px rgba(112,191,112,.45),0 2px 8px rgba(12,40,32,.35);}\n.poi:hover .poi-label,.poi:focus-visible .poi-label,.poi.active .poi-label{opacity:0;}\n\n/* hover tooltip anchored to the pin */\n.poi-card{position:absolute;left:22px;top:0;transform:translateY(-50%) translateX(-6px);width:248px;max-width:62vw;background:#fff;border:1px solid var(--line);border-radius:var(--r-md);box-shadow:0 20px 54px -16px rgba(12,40,32,.55);padding:16px 18px;text-align:left;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .2s,transform .2s;z-index:7;}\n.poi:hover .poi-card,.poi:focus-visible .poi-card,.poi.active .poi-card{opacity:1;visibility:visible;transform:translateY(-50%) translateX(0);}\n.poi-card::before{content:\"\";position:absolute;left:-7px;top:50%;transform:translateY(-50%) rotate(45deg);width:12px;height:12px;background:#fff;border-left:1px solid var(--line);border-bottom:1px solid var(--line);}\n/* right-side pins: open the tooltip to the left */\n.poi--flip .poi-card{left:auto;right:22px;transform:translateY(-50%) translateX(6px);}\n.poi--flip:hover .poi-card,.poi--flip:focus-visible .poi-card,.poi--flip.active .poi-card{transform:translateY(-50%) translateX(0);}\n.poi--flip .poi-card::before{left:auto;right:-7px;border-left:none;border-bottom:none;border-right:1px solid var(--line);border-top:1px solid var(--line);}\n.poi--flip .poi-label{left:auto;right:16px;}\n.poi-card .proj-tag{display:block;font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--emerald);}\n.poi-card-title{display:block;font-family:var(--display);font-weight:700;font-size:18px;color:var(--forest);margin:7px 0 8px;letter-spacing:-.01em;}\n.poi-card-title .proj-region{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.06em;color:var(--slate);text-transform:uppercase;margin-left:6px;}\n.poi-card-text{display:block;font-size:13.5px;line-height:1.5;color:var(--slate);}\n\n/* ---------- experience / track record ---------- */\n.experience{background:var(--paper-2);}\n.track-meta{display:flex;flex-wrap:wrap;gap:clamp(20px,4vw,44px);margin-top:clamp(34px,5vw,48px);padding-bottom:26px;border-bottom:1.5px solid var(--forest);font-family:var(--mono);font-size:13px;letter-spacing:.04em;color: l:last-child{border-right:none;}\n.impact-cell .n{font-family:var(--display);font-weight:700;font-size:clamp(38px,5vw,58px);color:var(--forest);letter-spacing:-.03em;line-height:1;}\n.impact-cell .n .suf{color:var(--emerald);}\n.impact-cell .l{font-size:14.5px;color:var(--slate);margin-top:12px;max-width:22ch;}\n.impact-note{margin-top:24px;font-size:13px;color:var(--slate);font-family:var(--mono);letter-spacing:.02em;}\n\n/* ---------- faq (lightweight, SEO) ---------- */\n.faq .wrap{display:grid;grid-template-columns:.8fr 1.2fr;gap:clamp(36px,6vw,72px);align-items:start;}\n.faq-list{display:grid;gap:0;}\n.faq-item{border-top:1px solid var(--line);}\n.faq-item:last-child{border-bottom:1px solid var(--line);}\n.faq-q{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:24px 0;display:flex;justify-content:space-between;align-items:center;gap:24px;font-family:var(--display);font-weight:600;font-size:clamp(17px,2vw,20px);color:var(--forest);}\n.faq-q .pm{flex:none;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;color:var(--emerald);transition:.25s;position:relative;}\n.faq-q .pm::before,.faq-q .pm::after{content:\"\";position:absolute;background:currentColor;border-radius:2px;}\n.faq-q .pm::before{width:11px;height:1.6px;}\n.faq-q .pm::after{width:1.6px;height:11px;transition:transform .25s;}\n.faq-item.open .pm{background:var(--emerald);border-color:var(--emerald);color:#fff;}\n.faq-item.open .pm::after{transform:scaleY(0);}\n.faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease;}\n.faq-a p{padding:0 0 24px;color:var(--slate);font-size:16px;max-width:60ch;}\n\n/* ---------- contact / CTA ---------- */\n.contact{background:linear-gradient(180deg,var(--forest) 0%,var(--forest-deep) 100%);color:#fff;}\n.contact .panel{display:grid;grid-template-columns:1.1fr .9fr;gap:clamp(36px,6vw,72px);align-items:center;}\n.contact .eyebrow{color:var(--green);}\n.contact .eyebrow::before{background:var(--green);}\n.contact h2{color:#fff;font-size:clamp(32px,4.6vw,54px);}\n.contact p{color:rgba(255,255,255,.8);font-size:clamp(17px,2vw,20px);margin-top:22px;max-width:46ch;}\n.contact .cta-row{margin-top:34px;display:flex;gap:14px;flex-wrap:wrap;}\n.contact-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:var(--r-lg);padding:clamp(28px,4vw,40px);}\n.contact-card h3{color:#fff;font-size:21px;}\n.contact-card .rows{margin-top:20px;display:grid;gap:2px;}\n.contact-card .row{display:flex;align-items:center;gap:14px;padding:14px 0;border-top:1px solid rgba(255,255,255,.12);font-size:15.5px;color:rgba(255,255,255,.86);}\n.contact-card .row:first-child{border-top:none;}\n.contact-card .row svg{color:var(--green);flex:none;}\n\n/* ---------- footer ---------- */\n.site-footer{background:var(--forest-deep);color:rgba(255,255,255,.7);padding:clamp(48px,7vw,72px) 0 36px;}\n.footer-top{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:40px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,.12);}\n.footer-brand .brand .wordmark{color:#fff;}\n.footer-brand p{margin-top:18px;font-size:15px;max-width:34ch;}\n.footer-col h5{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--green);margin-bottom:16px;font-weight:500;}\n.footer-col a{display:block;padding:7px 0;font-size:15px;color:rgba(255,255,255,.74);transition:color .2s;}\n.footer-col a:hover{color:#fff;}\n.footer-bottom{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;padding-top:28px;font-size:13.5px;color:rgba(255,255,255,.5);}\n.footer-bottom .land{max-width:62ch;}\n\n/* ---------- blog ---------- */\n.blog-hero{padding-top:clamp(140px,16vw,184px);background:var(--paper);}\n.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(24px,3vw,36px);margin-top:clamp(40px,6vw,56px);}\n.post-card{display:flex;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;transition:transform .2s,box-shadow .2s;}\n.post-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);}\n.post-card-media{position:relative;display:block;aspect-ratio:16/10;overflow:hidden;}\n.post-card-media img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}\n.post-card:hover .post-card-media img{transform:scale(1.04);}\n.post-cat{position:absolute;top:14px;left:14px;background:rgba(18,48,42,.8);backdrop-filter:blur(6px);color:#fff;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:6px 12px;border-radius:999px;}\n.post-card-body{padding:22px 24px 26px;display:flex;flex-direction:column;flex:1;}\n.post-meta{font-family:var(--mono);font-size:12px;letter-spacing:.04em;color:var(--slate);text-transform:uppercase;}\n.post-card-body h3{font-size:21px;margin:12px 0 10px;color:var(--forest);line-height:1.18;letter-spacing:-.01em;}\n.post-card-body h3 a{color:inherit;transition:color .2s;}\n.post-card-body h3 a:hover{color:var(--emerald);}\n.post-card-body p{font-size:15px;color:var(--slate);line-height:1.55;flex:1;}\n.post-more{margin-top:18px;font-family:var(--body);font-weight:600;font-size:14.5px;color:var(--emerald);display:inline-flex;align-items:center;gap:8px;}\n.post-more .arr{transition:transform .2s;}\n.post-card:hover .post-more .arr{transform:translateX(4px);}\n\n/* ---------- blog post (article) ---------- */\n.article{padding:clamp(140px,16vw,184px) 0 clamp(64px,9vw,110px);background:var(--paper);}\n.article-back{font-family:var(--mono);font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--slate);display:inline-flex;align-items:center;gap:8px;transition:color .2s;}\n.article-back:hover{color:var(--emerald);}\n.article-back .arr-l{transition:transform .2s;}\n.article-back:hover .arr-l{transform:translateX(-4px);}\n.article-head{max-width:760px;margin:clamp(28px,4vw,44px) auto 0;text-align:center;}\n.post-cat-inline{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--emerald);}\n.article-title{font-size:clamp(32px,5vw,54px);color:var(--forest);margin:16px 0 22px;letter-spacing:-.025em;line-height:1.05;}\n.article-meta{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;font-family:var(--mono);font-size:13px;letter-spacing:.02em;color:var(--slate);}\n.article-hero{margin:clamp(36px,5vw,56px) auto 0;max-width:1000px;border-radius:var(--r-lg);overflow:hidden;aspect-ratio:16/9;box-shadow:var(--shadow);}\n.article-hero img{width:100%;height:100%;object-fit:cover;display:block;}\n.article-body{max-width:720px;margin:clamp(40px,6vw,60px) auto 0;font-size:18px;line-height:1.75;color:var(--ink);}\n.article-body > * + *{margin-top:24px;}\n.article-body .article-lead{font-size:clamp(20px,2.4vw,23px);line-height:1.5;color:var(--forest);font-weight:500;}\n.article-body h2{font-family:var(--display);font-size:clamp(24px,3vw,30px);color:var(--forest);letter-spacing:-.02em;margin-top:42px;}\n.article-body a{color:var(--emerald);text-decoration:underline;text-underline-offset:3px;}\n.article-body blockquote{margin:34px 0;padding:6px 0 6px 26px;border-left:3px solid var(--green);font-family:var(--display);font-weight:500;font-size:clamp(20px,2.6vw,26px);line-height:1.3;color:var(--forest);letter-spacing:-.01em;}\n.article-body ul{padding-left:22px;}\n.article-body li{margin-top:10px;}\n.article-foot{max-width:720px;margin:clamp(40px,6vw,56px) auto 0;padding-top:clamp(28px,4vw,40px);border-top:1px solid var(--line);display:flex;gap:14px;flex-wrap:wrap;}\n\n/* ---------- reveal animation ---------- */\n.reveal{opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);}\n.reveal.in{opacity:1;transform:none;}\n.reveal.shown{opacity:1;transform:none;transition:none;}\n.reveal[data-d=\"1\"]{transition-delay:.08s;}\n.reveal[data-d=\"2\"]{transition-del ex:none;width:112px;height:112px;border-radius:50%;overflow:hidden;background:var(--mint);box-shadow:0 8px 24px -14px rgba(12,40,32,.5);}\n.founder-photo img{width:100%;height:100%;object-fit:cover;display:block;}\n.founder-photo--grey img{filter:grayscale(100%);}\n.founder-body h3{font-size:22px;color:var(--forest);}\n.founder-body .role{font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--emerald);display:block;margin:6px 0 14px;}\n.founder-body p{font-size:14.5px;color:var(--slate);line-height:1.6;}\n.values{margin-top:clamp(48px,7vw,72px);}\n.values-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:24px;}\n.value{padding:22px;border:1px solid var(--line);border-radius:var(--r-md);background:#fff;}\n.value h4{font-size:16.5px;font-family:var(--display);color:var(--forest);margin-bottom:8px;}\n.value p{font-size:14px;color:var(--slate);}\n\n/* ---------- about responsive ---------- */\n@media (max-width:1080px){\n  .about .es-row,.about .values-grid{grid-template-columns:1fr 1fr;}\n  .founders{grid-template-columns:1fr;}\n}\n@media (max-width:640px){\n  .blog-grid{grid-template-columns:1fr;}\n  .about .es-row,.about .values-grid{grid-template-columns:1fr;}\n  .founder{flex-direction:column;align-items:flex-start;}\n}\n\n/* ---------- header brand: keep on one line on small screens ---------- */\n.site-header .brand .wordmark{white-space:nowrap;}\n@media (max-width:760px){\n  .nav{height:88px;}\n  .site-header .brand img{height:52px;}\n  .site-header .brand .wordmark{font-size:19px;}\n  .nav-links{inset:88px 0 auto 0;}\n  .hero{padding-top:88px;}\n}\n\n.reveal{opacity:1!important;transform:none!important;}html{scroll-behavior:auto;}body{overflow-x:hidden;}\n.article{padding-top:40px!important;}\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\n\u003c!-- ============ HEADER ============ -->\n\n\n\u003cmain id=\"top\">\n\n  \u003c!-- ============ ARTICLE ============ -->\n  \u003carticle class=\"article\">\n    \u003cdiv class=\"wrap\">\n      \u003ca class=\"article-back\" href=\"../blog.html\">\u003cspan class=\"arr-l\">\u2190\u003c/span> All posts\u003c/a>\n\n      \u003cheader class=\"article-head reveal\">\n        \u003cspan class=\"post-cat-inline\">Policy &amp; Markets\u003c/span>\n        \u003ch1 class=\"article-title\">BC asked for 25 percent. First Nations took 51. Clean fuel is the next test.\u003c/h1>\n        \u003cdiv class=\"article-meta\">\n          \u003cspan>By Alan Kneisz, Solum Energy\u003c/span>\n          \u003cspan aria-hidden=\"true\">\u00b7\u003c/span>\n          \u003ctime datetime=\"2026-06-29\">June 29, 2026\u003c/time>\n          \u003cspan aria-hidden=\"true\">\u00b7\u003c/span>\n          \u003cspan>4 min read\u003c/span>\n        \u003c/div>\n      \u003c/header>\n\n      \u003cfigure class=\"article-hero reveal\" data-d=\"1\">\n        \u003csvg style=\"width:100%;height:auto;display:block\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1000 563\" font-family=\"'Hanken Grotesk','Schibsted Grotesk',Arial,sans-serif\">\n  \u003crect width=\"1000\" height=\"563\" fill=\"#f5f8f4\"/>\n  \u003c!-- title block -->\n  \u003ctext x=\"70\" y=\"74\" font-size=\"33\" font-weight=\"700\" fill=\"#1a3d35\" letter-spacing=\"-0.5\">Required 25 percent. Delivered 51 percent.\u003c/text>\n  \u003ctext x=\"70\" y=\"106\" font-size=\"18\" fill=\"#516159\">First Nations equity in BC Hydro's 2025 call for power, all four winning wind projects\u003c/text>\n\n  \u003c!-- baseline -->\n  \u003cline x1=\"70\" y1=\"470\" x2=\"930\" y2=\"470\" stroke=\"#d6e2d6\" stroke-width=\"2\"/>\n\n  \u003c!-- gridlines -->\n  \u003cline x1=\"70\" y1=\"335\" x2=\"930\" y2=\"335\" stroke=\"#eef4ec\" stroke-width=\"1.5\"/>\n  \u003cline x1=\"70\" y1=\"200\" x2=\"930\" y2=\"200\" stroke=\"#eef4ec\" stroke-width=\"1.5\"/>\n\n  \u003c!-- Bar: required minimum 25% -> height 135 -->\n  \u003crect x=\"295\" y=\"335\" width=\"160\" height=\"135\" rx=\"6\" fill=\"#70bf70\"/>\n  \u003ctext x=\"375\" y=\"315\" font-size=\"34\" font-weight=\"700\" fill=\"#1a3d35\" text-anchor=\"middle\">25%\u003c/text>\n  \u003ctext x=\"375\" y=\"505\" font-size=\"19\" font-weight=\"600\" fill=\"#516159\" text-anchor=\"middle\">Required minimum\u003c/text>\n\n  \u003c!-- Bar: delivered 51% -> height 276 -->\n  \u003crect x=\"595\" y=\"194\" width=\"160\" height=\"276\" rx=\"6\" fill=\"#1a3d35\"/>\n  \u003ctext x=\"675\" y=\"174\" font-size=\"34\" font-weight=\"700\" fill=\"#1a3d35\" text-anchor=\"middle\">51%\u003c/text>\n  \u003ctext x=\"675\" y=\"505\" font-size=\"19\" font-weight=\"600\" fill=\"#516159\" text-anchor=\"middle\">What every project delivered\u003c/text>\n\n  \u003c!-- ownership annotation -->\n  \u003cg>\n    \u003crect x=\"772\" y=\"262\" width=\"200\" height=\"46\" rx=\"23\" fill=\"#2f7f60\" fill-opacity=\"0.16\"/>\n    \u003ctext x=\"872\" y=\"292\" font-size=\"21\" font-weight=\"700\" fill=\"#2f7f60\" text-anchor=\"middle\">$2B+ FN-owned\u003c/text>\n  \u003c/g>\n\n  \u003c!-- source -->\n  \u003ctext x=\"70\" y=\"548\" font-size=\"13\" fill=\"#8a9690\">Source: Province of B.C. and BC Hydro, 2025 Call for Power results (May 13, 2026).\u003c/text>\n\u003c/svg>\n\n      \u003c/figure>\n\n      \u003cdiv class=\"article-body reveal\" data-d=\"1\">\n        \u003cp class=\"article-lead\">British Columbia ran a competition for new clean power and set the rules in advance. Projects had to offer First Nations at least a 25 percent ownership stake to qualify. When the winners were named, every one of them had gone to 51 percent. The floor was a quarter. The market cleared at a majority.\u003c/p>\n\n        \u003cp>The result came out of \u003ca href=\"https://www.bchydro.com/work-with-us/selling-clean-energy/2025-call-for-power.html\" target=\"_blank\" rel=\"noopener\">BC Hydro's 2025 call for power\u003c/a>, which drew 14 proposals offering more than 9,100 gigawatt hours a year, nearly double the target. BC Hydro awarded 30-year contracts to four wind projects that will deliver about 3,500 gigawatt hours annually, enough to power roughly 350,000 homes and lift the utility's supply by 5 percent. The province put the headline number plainly: the call required a minimum 25 percent First Nations equity stake, and all four successful projects came in at 51 percent, representing \u003ca href=\"https://news.gov.bc.ca/releases/2026ECS0014-000552\" target=\"_blank\" rel=\"noopener\">more than $2 billion of First Nations ownership\u003c/a> in new energy assets. The build will draw $4.3 billion in private capital and create 1,500 jobs.\u003c/p>\n\n        \u003ch2>The floor moved, and the market moved past it\u003c/h2>\n        \u003cp>For years, Indigenous ownership in Canadian energy was treated as a concession, something a developer offered late, sized small, and framed as goodwill. The BC result shows that era ending. When a government makes 25 percent the price of entry, and competitive bidders volunteer to double it, ownership has stopped being a favour and become a feature of how strong projects are built. Part of the reason is that the financing now exists to back it. Through its Indigenous Equity Initiative, the Canada Infrastructure Bank offered loans covering up to 90 percent of a First Nation's equity position in these projects, turning a seat at the table into a signature on the cap table.\u003c/p>\n\n        \u003cblockquote>When a government sets the floor at 25 percent and every winning bidder clears 51, co-ownership has stopped being a favour and become the standard.\u003c/blockquote>\n\n        \u003ch2>The standard has not reached clean fuel yet\u003c/h2>\n        \u003cp>Here is what stands out from where we sit. This benchmark was set for electricity. The 2025 call, like the 2024 call before it, was about wind and solar feeding the grid. Clean fuel, green hydrogen, renewable natural gas, and biomass methanol, has not been held to the same bar by any comparable procurement. There is no clean-fuel call for power that makes majority community ownership the condition of winning. Yet the logic transfers cleanly. A fuel plant sits on the land, draws on the feedstock, and runs for decades, exactly the kind of asset where the case for local ownership is strongest.\u003c/p>\n\n        \u003cp>The bridge is already visible in the winners' list. West Moberly First Nations is the named partner on two of the four wind projects, Bessie and Sweetwater, both in the Peace region. West Moberly has also signed a \u003ca href=\"https://www.canadianmethanol.com/\" target=\"_blank\" rel=\"noopener\">memorandum of understanding with Canadian Methanol Corporation\u003c/a> to explore methanol production on its territory near Tumbler Ridge, including supplying waste heat to a community-owned greenhouse. The same Nation taking a majority stake in BC wind is positioned to do the same in clean fuel. The appetite is there. What has been missing is a developer model and a procurement structure that treat fuel ownership the way BC just treated power ownership.\u003c/p>\n\n        \u003ch2>Why this is the work in front of us\u003c/h2>\n        \u003cp>This is the gap Solum was built to close. We start from the premise that First Nations should be co-owners of clean-fuel projects from the first conversation, not consulted parties at the end of one. For a long time that premise rested on principle alone. The BC call for power shows principle hardening into market practice, with the equity stakes, the federal financing, and the competitive pressure all pointing the same way. The 25 percent floor that became a 51 percent norm in BC electricity is a preview of where clean fuel is headed, and the developers structured for it now will be the ones still standing when a fuel procurement finally asks the same question.\u003c/p>\n\n        \u003cp>Canada spent this past week marking the largest Indigenous loan guarantee in its history, a roughly $700 million First Nations stake in the Darlington nuclear project. The number is historic. The pattern underneath it is the more useful signal. Across nuclear, wind, and transmission, the same answer keeps arriving: communities are becoming owners, not bystanders. Clean fuel is the obvious next chapter, and the feedstock, the jobs, and the value all already sit in the same places the ownership should. That is the work, and it is the work we came to do.\u003c/p>\n\n        \u003ch2>Sources\u003c/h2>\n        \u003cul>\n          \u003cli>Province of B.C. and BC Hydro. \u003ca href=\"https://news.gov.bc.ca/releases/2026ECS0014-000552\" target=\"_blank\" rel=\"noopener\">Strong response to 2025 call for power, delivering clean, affordable energy\u003c/a> (May 13, 2026).\u003c/li>\n          \u003cli>BC Hydro. \u003ca href=\"https://www.bchydro.com/work-with-us/selling-clean-energy/2025-call-for-power.html\" target=\"_blank\" rel=\"noopener\">2025 Call for Power\u003c/a>.\u003c/li>\n          \u003cli>Canadian Methanol Corporation. \u003ca href=\"https://www.canadianmethanol.com/\" target=\"_blank\" rel=\"noopener\">Tumbler Ridge methanol project and West Moberly First Nations MOU\u003c/a>.\u003c/li>\n          \u003cli>Department of Finance Canada. \u003ca href=\"https://www.canada.ca/en/department-finance/news/2026/06/government-announces-largest-indigenous-loan-guarantee-in-canadian-history-to-support-darlington-new-nuclear-project.html\" target=\"_blank\" rel=\"noopener\">Government announces largest Indigenous loan guarantee in Canadian history to support Darlington New Nuclear Project\u003c/a> (June 23, 2026).\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n\n      \u003cdiv class=\"article-foot reveal\" data-d=\"2\">\n        \u003ca class=\"btn btn-primary\" href=\"https://forms.office.com/Pages/ResponsePage.aspx?id=vCMz4rcbukWS799uzktcoOvDG3h3Hd9Ium23QADs16ZUMlZIQllWRDBNREpORU1ZQzRVN0s2WlNFTy4u\" target=\"_blank\" rel=\"noopener\">Partner With Us \u003cspan class=\"arr\">\u2192\u003c/span>\u003c/a>\n        \u003ca class=\"btn btn-ghost\" href=\"../blog.html\">Back to blog\u003c/a>\n      \u003c/div>\n    \u003c/div>\n  \u003c/article>\n\n\u003c/main>\n\n\u003c!-- ============ FOOTER ============ -->\n\n\n\n\u003c/body>\n\u003c/html>\n"}, {"title": "The forest is the feedstock: what it takes to build a regional clean fuel industry in BC and Alberta", "category": "Industry Framework", "date": "June 28, 2026", "url": "https://solumenergy.ca/blog/forestry-waste-clean-fuel-bc-alberta.html", "sources": [{"label": "Solum Energy framework essay, \u201cWhat Does It Take to Build a Regional Renewable Fuels Industry? The Case for British Columbia and Alberta\u201d (Alan Kneisz, June 2026)", "url": ""}, {"label": "Solum Energy deck, \u201cFrom Forest Waste to Clean Fuel: Biomethanol & RNG across BC & Alberta\u201d (June 2026)", "url": ""}], "slug": "forestry-waste-clean-fuel-bc-alberta", "test": false, "summary": "BC and Alberta already hold the biomass, infrastructure, ports, and policy to build a regional renewable fuels industry from forestry waste. This framework lays out two pathways, biomethanol and RNG, the regional platform from Prince George to the Alberta Heartland to Prince Rupert, and what a disciplined first project must prove with First Nations as co-owners.", "linkedin": "BC and Alberta already hold the pieces of a regional renewable fuels industry: forestry waste at scale, industrial infrastructure, carbon capture, and Pacific ports. The hard part is organizing them. Our new framework lays out two pathways for turning forest residue into clean fuel, biomethanol and RNG, and what a credible first project must prove, with First Nations as co-owners from day one.\n\nRead the June 2026 framework: https://solumenergy.ca/blog/forestry-waste-clean-fuel-bc-alberta.html", "preview": "\u003c!DOCTYPE html>\n\u003chtml lang=\"en-CA\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\" />\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n\u003ctitle>The Forest Is the Feedstock: Building a Regional Clean Fuel Industry in BC and Alberta | Solum Energy Blog\u003c/title>\n\u003cmeta name=\"description\" content=\"BC and Alberta already hold the biomass, infrastructure, ports, and policy to build a regional renewable fuels industry from forestry waste. A framework for biomethanol and RNG, and what the first project must prove.\" />\n\u003cmeta name=\"theme-color\" content=\"#1a3d35\" />\n\u003clink rel=\"canonical\" href=\"https://solumenergy.ca/blog/forestry-waste-clean-fuel-bc-alberta.html\" />\n\n\u003clink rel=\"preconnect\" href=\"https://fonts.googleapis.com\" />\n\u003clink rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin />\n\u003clink href=\"https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap\" rel=\"stylesheet\" />\n\u003cstyle>/* ============================================================\n   Solum Energy \u2014 redesign stylesheet\n   Palette: forest #1a3d35 \u00b7 emerald #2f7f60 \u00b7 green #70bf70\n            sage #9ac9ad \u00b7 mint #d9f2db\n   ============================================================ */\n:root{\n  --forest:#1a3d35; --forest-deep:#12302a; --emerald:#2f7f60;\n  --green:#70bf70; --sage:#9ac9ad; --mint:#d9f2db;\n  --paper:#f5f8f4; --paper-2:#eef4ec; --ink:#15241f; --slate:#516159;\n  --line:rgba(26,61,53,.12); --line-soft:rgba(26,61,53,.08);\n  --display:'Schibsted Grotesk',system-ui,sans-serif;\n  --body:'Hanken Grotesk',system-ui,sans-serif;\n  --mono:'IBM Plex Mono',ui-monospace,monospace;\n  --maxw:max(1240px,calc(620px + 50vw)); --gutter:clamp(20px,5vw,64px);\n  --r-lg:24px; --r-md:16px; --r-sm:10px;\n  --shadow:0 18px 50px -20px rgba(12,40,32,.35);\n  --shadow-sm:0 8px 24px -12px rgba(12,40,32,.28);\n}\n*{box-sizing:border-box;}\nhtml{scroll-behavior:smooth;scroll-padding-top:92px;-webkit-font-smoothing:antialiased;text-rendering:optimiz ansparent;color:var(--forest);border-color:var(--line);}\n.btn-ghost:hover{border-color:var(--emerald);color:var(--emerald);}\n.btn-ghost.on-dark{color:#fff;border-color:rgba(255,255,255,.34);}\n.btn-ghost.on-dark:hover{border-color:#fff;color:var(--mint);}\n\n/* ---------- header / nav ---------- */\n.site-header{position:fixed;inset:0 0 auto 0;z-index:50;transition:background .3s,box-shadow .3s,border-color .3s;border-bottom:1px solid transparent;}\n.site-header.scrolled{background:rgba(245,248,244,.82);backdrop-filter:saturate(1.4) blur(14px);border-bottom-color:var(--line-soft);box-shadow:0 6px 24px -18px rgba(12,40,32,.5);}\n.nav{display:flex;align-items:center;justify-content:space-between;height:148px;transition:height .35s cubic-bezier(.4,0,.2,1);}\n.brand{display:flex;align-items:center;gap:14px;}\n.brand img{height:38px;width:auto;transition:height .35s cubic-bezier(.4,0,.2,1);}\n.brand .wordmark{font-family:var(--display);font-weight:700;font-size:21px;letter-spacing:.08em;color:var(--forest);transition:font-size .35s cubic-bezier(.4,0,.2,1);}\n/* large at the top of the page */\n.site-header .brand img{height:112px;}\n.site-header .brand .wordmark{font-size:28px;}\n/* shrink back to the original size once scrolled */\n.site-header.scrolled .nav{height:76px;}\n.site-header.scrolled .brand img{height:38px;}\n.site-header.scrolled .brand .wordmark{font-size:21px;}\n.nav-links{display:flex;align-items:center;gap:34px;}\n.nav-links a.link{font-size:15.5px;font-weight:500;color:var(--ink);opacity:.82;position:relative;padding:4px 0;transition:opacity .2s,color .2s;}\n.nav-links a.link::after{content:\"\";position:absolute;left:0;right:0;bottom:-2px;height:1.5px;background:var(--emerald);transform:scaleX(0);transform-origin:left;transition:transform .25s;}\n.nav-links a.link:hover{opacity:1;color:var(--emerald);}\n.nav-links a.link:hover::after,.nav-links a.link.active::after{transform:scaleX(1);}\n.nav-links a.link.active{opacity:1;color:var(--emerald);}\n.nav idth:300px;}\n.hero-badge .dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(112,191,112,.3);flex:none;}\n.hero-badge .t{font-size:13.5px;line-height:1.35;}\n.hero-badge .t b{color:var(--mint);font-weight:600;}\n\n/* ---------- logo / context strip ---------- */\n.context-strip{background:var(--forest);color:#fff;}\n.context-strip .wrap{display:flex;align-items:center;gap:clamp(24px,5vw,64px);flex-wrap:wrap;padding-block:26px;justify-content:space-between;}\n.context-strip .item{display:flex;align-items:center;gap:12px;font-size:14.5px;color:rgba(255,255,255,.84);}\n.context-strip .item svg{flex:none;color:var(--green);}\n\n/* ---------- mission ---------- */\n.mission .wrap{display:grid;grid-template-columns:.85fr 1.15fr;gap:clamp(40px,7vw,90px);align-items:start;}\n.mission .big{font-family:var(--display);font-weight:600;font-size:clamp(26px,3.4vw,38px);line-height:1.16;letter-spacing:-.02em;color:var(--forest);text-wrap:balance;}\n.mission .big em{font-style:normal;color:var(--emerald);}\n.mission .body p+p{margin-top:20px;}\n.mission .body .lead{color:var(--slate);}\n.mission .define{margin-top:30px;padding:22px 24px;border:1px solid var(--line);border-radius:var(--r-md);background:#fff;}\n.mission .define .term{font-family:var(--display);font-weight:700;color:var(--forest);font-size:19px;}\n.mission .define .term span{font-family:var(--mono);font-size:12px;color:var(--emerald);letter-spacing:.08em;margin-left:8px;}\n.mission .define p{font-size:15px;color:var(--slate);margin-top:6px;}\n\n/* ---------- pillars ---------- */\n.pillars{background:var(--paper-2);}\n.pillars-intro{display:grid;grid-template-columns:1.1fr .9fr;gap:clamp(32px,5vw,64px);align-items:center;margin-bottom:clamp(8px,2vw,20px);}\n.pillars-intro .section-head{max-width:none;}\n.pillars-intro-media{border-radius:var(--r-lg);overflow:hidden;aspect-ratio:4/3;box-shadow:var(--shadow);}\n.pillars-intro-media img{width:100%;height:100%;object-fit:cover;display:block;}\n.pillar{display:grid;grid-template-columns:1fr 1fr;gap:clamp(36px,6vw,80px);align-items:center;padding:clamp(48px,7vw,80px) 0;border-top:1px solid var(--line);}\n.pillar:first-of-type{border-top:none;}\n.pillar.flip .pillar-media{order:2;}\n.pillar-media{position:relative;border-radius:var(--r-lg);overflow:hidden;aspect-ratio:5/4;box-shadow:var(--shadow);}\n.pillar-media img{width:100%;height:100%;object-fit:cover;will-change:transform;}\n.pillar-media .tag{position:absolute;top:18px;left:18px;background:rgba(18,48,42,.7);backdrop-filter:blur(6px);color:#fff;font-family:var(--mono);font-size:11.5px;letter-spacing:.14em;padding:8px 14px;border-radius:999px;}\n.pillar-num{font-family:var(--mono);font-size:13px;color:var(--emerald);letter-spacing:.2em;}\n.pillar-body h3{font-size:clamp(26px,3.4vw,38px);margin:16px 0 18px;}\n.pillar-body>p{color:var(--slate);font-size:clamp(16px,1.9vw,18.5px);max-width:48ch;}\n.pillar-list{list-style:none;margin:28px 0 0;padding:0;display:grid;gap:2px;}\n.pillar-list li{display:grid;grid-template-columns:auto 1fr;gap:16px;padding:18px 0;border-top:1px solid var(--line);align-items:start;}\n.pillar-list .ic{width:38px;height:38px;border-radius:10px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;color:var(--emerald);flex:none;}\n.pillar-list .ic svg{width:19px;height:19px;}\n.pillar-list h4{font-size:16.5px;font-family:var(--display);color:var(--forest);}\n.pillar-list p{font-size:14.5px;color:var(--slate);margin-top:4px;}\n\n/* ---------- partnership ---------- */\n.partner{background:var(--forest);color:#fff;position:relative;overflow:hidden;}\n.partner .eyebrow{color:var(--green);}\n.partner .eyebrow::before{background:var(--green);}\n.partner h2{color:#fff;}\n.partner .section-head p{color:rgba(255,255,255,.78);}\n.partner .intro{display:grid;grid-template-columns:1fr;gap:clamp(36px,6vw,72px);align-items:end;}\n.partner .intro .equity{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:var(--r-md);padding:26px 28px;}\n.partner .intro .equity .n{font-family:var(--display);font-weight:700;font-size:clamp(40px,6vw,64px);color:var(--green);line-height:1;letter-spacing:-.03em;}\n.partner .intro .equity .l{font-size:15px;color:rgba(255,255,255,.82);margin-top:10px;max-width:30ch;}\n.process{margin-top:clamp(48px,7vw,72px);}\n.process-title{color:#fff;font-size:clamp(20px,2.6vw,26px);font-weight:600;letter-spacing:-.01em;max-width:30ch;margin-bottom:clamp(28px,4vw,40px);}\n.process-track{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;counter-reset:step;}\n.process-step{position:relative;padding-top:34px;}\n.process-step::before{counter-increment:step;content:counter(step,decimal-leading-zero);position:absolute;top:0;left:0;font-family:var(--mono);font-size:12px;color:var(--green);letter-spacing:.1em;}\n.process-step::after{content:\"\";position:absolute;top:6px;left:34px;right:-9px;height:1px;background:linear-gradient(90deg,rgba(112,191,112,.5),rgba(112,191,112,.12));}\n.process-step:last-child::after{display:none;}\n.process-step .dot{position:absolute;top:1px;left:32px;width:11px;height:11px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(112,191,112,.18);}\n.process-step h4{font-size:17px;color:#fff;margin-bottom:8px;}\n.process-step p{font-size:14px;color:rgba(255,255,255,.7);}\n.partner-media{margin-top:clamp(48px,7vw,72px);position:relative;border-radius:var(--r-lg);overflow:hidden;aspect-ratio:21/8;box-shadow:var(--shadow);}\n.partner-media img{width:100%;height:100%;object-fit:cover;will-change:transform;}\n.partner-media .quote{position:absolute;left:0;bottom:0;right:0;padding:clamp(28px,5vw,52px);background:linear-gradient(transparent,rgba(12,40,32,.85));}\n.partner-media .quote p{font-family:var(--display);font-weight:600;font-size:clamp(18px,2.6vw,28px);color:#fff;max-width:24ch;line-height:1.2;letter-spacing:-.02em;}\n.partner-media .quote .who{font-family:var(--mono);font-size:12.5px;color:var(--mint);letter-spacing:.1em;margin-top:14px;}\n\n/* ---------- projects / map ---------- */\n.projects{background:var(--paper);}\n.map-layout{display:flex;justify-content:center;margin-top:clamp(40px,6vw,60px);}\n.map-wrap{position:relative;width:100%;max-width:1080px;aspect-ratio:1/1;}\n.canada-map{width:100%;height:100%;object-fit:contain;display:block;filter:drop-shadow(0 16px 40px rgba(12,40,32,.18));}\n\n/* point markers */\n.poi{position:absolute;width:0;height:0;background:none;border:none;padding:0;cursor:pointer;z-index:2;}\n.poi .pin{position:absolute;left:0;top:0;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:var(--green);border:2.5px solid #fff;box-shadow:0 2px 8px rgba(12,40,32,.45);transition:transform .2s,background .2s,box-shadow .2s;}\n.poi .pin::before{content:\"\";position:absolute;inset:-7px;border-radius:50%;border:2px solid var(--green);opacity:.6;animation:poi-pulse 2.4s ease-out infinite;}\n@keyframes poi-pulse{0%{transform:scale(.6);opacity:.6;}70%{opacity:0;}100%{transform:scale(1.6);opacity:0;}}\n.poi .poi-label{position:absolute;left:16px;top:0;transform:translateY(-50%);font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--forest);background:rgba(245,248,244,.82);padding:2px 7px;border-radius:6px;white-space:nowrap;backdrop-filter:blur(2px);transition:opacity .2s;}\n.poi:hover,.poi:focus-visible,.poi.active{z-index:6;outline:none;}\n.poi:hover .pin,.poi:focus-visible .pin,.poi.active .pin{background:var(--mint);transform:translate(-50%,-50%) scale(1.45);}\n.poi:focus-visible .pin{box-shadow:0 0 0 4px rgba(112,191,112,.45),0 2px 8px rgba(12,40,32,.35);}\n.poi:hover .poi-label,.poi:focus-visible .poi-label,.poi.active .poi-label{opacity:0;}\n\n/* hover tooltip anchored to the pin */\n.poi-card{position:absolute;left:22px;top:0;transform:translateY(-50%) translateX(-6px);width:248px;max-width:62vw;background:#fff;border:1px solid var(--line);border-radius:var(--r-md);box-shadow:0 20px 54px -16px rgba(12,40,32,.55);padding:16px 18px;text-align:left;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .2s,transform .2s;z-index:7;}\n.poi:hover .poi-card,.poi:focus-visible .poi-card,.poi.active .poi-card{opacity:1;visibility:visible;transform:translateY(-50%) translateX(0);}\n.poi-card::before{content:\"\";position:absolute;left:-7px;top:50%;transform:translateY(-50%) rotate(45deg);width:12px;height:12px;background:#fff;border-left:1px solid var(--line);border-bottom:1px solid var(--line);}\n/* right-side pins: open the tooltip to the left */\n.poi--flip .poi-card{left:auto;right:22px;transform:translateY(-50%) translateX(6px);}\n.poi--flip:hover .poi-card,.poi--flip:focus-visible .poi-card,.poi--flip.active .poi-card{transform:translateY(-50%) translateX(0);}\n.poi--flip .poi-card::before{left:auto;right:-7px;border-left:none;border-bottom:none;border-right:1px solid var(--line);border-top:1px solid var(--line);}\n.poi--flip .poi-label{left:auto;right:16px;}\n.poi-card .proj-tag{display:block;font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--emerald);}\n.poi-card-title{display:block;font-family:var(--display);font-weight:700;font-size:18px;color:var(--forest);margin:7px 0 8px;letter-spacing:-.01em;}\n.poi-card-title .proj-region{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.06em;color:var(--slate);text-transform:uppercase;margin-left:6px;}\n.poi-card-text{display:block;font-size:13.5px;line-height:1.5;color:var(--slate);}\n\n/* ---------- experience / track record ---------- */\n.experience{background:var(--paper-2);}\n.track-meta{display:flex;flex-wrap:wrap;gap:clamp(20px,4vw,44px);margin-top:clamp(34px,5vw,48px);padding-bottom:26px;border-bottom:1.5px solid var(--forest);font-family:var(--mono);font-size:13px;letter-spacing:.04em;color:var(--slate);text-transform:uppercase;}\n.track-meta span{display:inline-flex;align-items:center;gap:8px;}\n.track-meta b{font-family:var(--display);font-size:20px;font-weight:700;color:var(--forest);letter-spacing:-.01em;}\n.track-wrap{margin-top:0;}\n.track-table{width:100%;border-collapse:collapse;table-layout:fixed;}\n.track-table th{text-align:left;font-family:var(--mono);font-size:11.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--emerald);padding:20px 24px 16px 0;vertical-align:bottom;}\n.track-table th:nth-child(1){width:54%;}\n.track-table th:nth-child(2){width:24%;}\n.track-table th:nth-child(3){width:22%;}\n.track-table td{padding:22px 24px 22px 0;border-top:1px solid var(--line);vertical-align:top;}\n.track-table td:first-child{font-family:var(--display);font-weight:500;font-size:clamp(15px,1.7vw,17.5px);line-height:1.34;color:var(--forest);letter-spacing:-.012em;padding-right:clamp(20px,4vw,56px);}\n.track-table tbody tr{transition:background .2s;}\n.track-table tbody tr:hover{background:linear-gradient(90deg,rgba(217,242,219,.55),rgba(217,242,219,0));}\n.sector-pill{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12px;letter-spacing:.02em;color:var(--forest);background:#fff;border:1px solid var(--sage);border-radius:999px;padding:7px 14px;white-space:nowrap;}\n.sector-pill .sd{width:7px;height:7px;border-radius:50%;background:var(--emerald);flex:none;}\n.geo{display:inline-flex;align-items:center;gap:9px;color:var(--slate);font-size:14.5px;line-height:1.3;}\n.geo svg{width:17px;height:17px;color:var(--emerald);flex:none;}\n\n/* ---------- impact ---------- */\n.impact{background:var(--paper);}\n.impact-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:#fff;margin-top:clamp(40px,6vw,56px);}\n.impact-cell{padding:clamp(28px,3.5vw,40px);border-right:1px solid var(--line);position:relative;}\n.impact-cell:last-child{border-right:none;}\n.impact-cell .n{font-family:var(--display);font- n.contact p{color:rgba(255,255,255,.8);font-size:clamp(17px,2vw,20px);margin-top:22px;max-width:46ch;}\n.contact .cta-row{margin-top:34px;display:flex;gap:14px;flex-wrap:wrap;}\n.contact-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:var(--r-lg);padding:clamp(28px,4vw,40px);}\n.contact-card h3{color:#fff;font-size:21px;}\n.contact-card .rows{margin-top:20px;display:grid;gap:2px;}\n.contact-card .row{display:flex;align-items:center;gap:14px;padding:14px 0;border-top:1px solid rgba(255,255,255,.12);font-size:15.5px;color:rgba(255,255,255,.86);}\n.contact-card .row:first-child{border-top:none;}\n.contact-card .row svg{color:var(--green);flex:none;}\n\n/* ---------- footer ---------- */\n.site-footer{background:var(--forest-deep);color:rgba(255,255,255,.7);padding:clamp(48px,7vw,72px) 0 36px;}\n.footer-top{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:40px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,.12);}\n.footer-brand .brand .wordmark{color:#fff;}\n.footer-brand p{margin-top:18px;font-size:15px;max-width:34ch;}\n.footer-col h5{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--green);margin-bottom:16px;font-weight:500;}\n.footer-col a{display:block;padding:7px 0;font-size:15px;color:rgba(255,255,255,.74);transition:color .2s;}\n.footer-col a:hover{color:#fff;}\n.footer-bottom{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;padding-top:28px;font-size:13.5px;color:rgba(255,255,255,.5);}\n.footer-bottom .land{max-width:62ch;}\n\n/* ---------- blog ---------- */\n.blog-hero{padding-top:clamp(140px,16vw,184px);background:var(--paper);}\n.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(24px,3vw,36px);margin-top:clamp(40px,6vw,56px);}\n.post-card{display:flex;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;transition:transform .2s,box-shadow .2 acing:.14em;text-transform:uppercase;color:var(--emerald);}\n.article-title{font-size:clamp(32px,5vw,54px);color:var(--forest);margin:16px 0 22px;letter-spacing:-.025em;line-height:1.05;}\n.article-meta{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;font-family:var(--mono);font-size:13px;letter-spacing:.02em;color:var(--slate);}\n.article-hero{margin:clamp(36px,5vw,56px) auto 0;max-width:1000px;border-radius:var(--r-lg);overflow:hidden;aspect-ratio:16/9;box-shadow:var(--shadow);}\n.article-hero img{width:100%;height:100%;object-fit:cover;display:block;}\n.article-body{max-width:720px;margin:clamp(40px,6vw,60px) auto 0;font-size:18px;line-height:1.75;color:var(--ink);}\n.article-body > * + *{margin-top:24px;}\n.article-body .article-lead{font-size:clamp(20px,2.4vw,23px);line-height:1.5;color:var(--forest);font-weight:500;}\n.article-body h2{font-family:var(--display);font-size:clamp(24px,3vw,30px);color:var(--forest);letter-spacing:-.02em;margin-top:42px;}\n.article-body a{color:var(--emerald);text-decoration:underline;text-underline-offset:3px;}\n.article-body blockquote{margin:34px 0;padding:6px 0 6px 26px;border-left:3px solid var(--green);font-family:var(--display);font-weight:500;font-size:clamp(20px,2.6vw,26px);line-height:1.3;color:var(--forest);letter-spacing:-.01em;}\n.article-body ul{padding-left:22px;}\n.article-body li{margin-top:10px;}\n.article-foot{max-width:720px;margin:clamp(40px,6vw,56px) auto 0;padding-top:clamp(28px,4vw,40px);border-top:1px solid var(--line);display:flex;gap:14px;flex-wrap:wrap;}\n\n/* ---------- reveal animation ---------- */\n.reveal{opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);}\n.reveal.in{opacity:1;transform:none;}\n.reveal.shown{opacity:1;transform:none;transition:none;}\n.reveal[data-d=\"1\"]{transition-delay:.08s;}\n.reveal[data-d=\"2\"]{transition-delay:.16s;}\n.reveal[data-d=\"3\"]{transition-delay:.24s;}\n.reveal[data-d=\"4\"]{tr
