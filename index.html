log.html\">\u003cspan class=\"arr-l\">\u2190\u003c/span> All posts\u003c/a>\n\n      \u003cheader class=\"article-head reveal\">\n        \u003cspan class=\"post-cat-inline\">Industry Framework\u003c/span>\n        \u003ch1 class=\"article-title\">The forest is the feedstock: what it takes to build a regional clean fuel industry in BC and Alberta\u003c/h1>\n        \u003cdiv class=\"article-meta\">\n          \u003cspan>By Alan Kneisz, Solum Energy\u003c/span>\n          \u003cspan aria-hidden=\"true\">\u00b7\u003c/span>\n          \u003ctime datetime=\"2026-06-28\">June 28, 2026\u003c/time>\n          \u003cspan aria-hidden=\"true\">\u00b7\u003c/span>\n          \u003cspan>6 min read\u003c/span>\n        \u003c/div>\n      \u003c/header>\n\n      \u003cfigure class=\"article-hero reveal\" data-d=\"1\">\n        \u003csvg style=\"width:100%;height:auto;display:block\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1000 563\" font-family=\"'Hanken Grotesk','Schibsted Grotesk',Arial,sans-serif\">\n  \u003crect width=\"1000\" height=\"563\" fill=\"#f5f8f4\"/>\n\n  \u003c!-- title -->\n  \u003ctext x=\"60\" y=\"70\" font-size=\"32\" font-weight=\"700\" fill=\"#1a3d35\" letter-spacing=\"-0.5\">Two pathways from one forest waste stream\u003c/text>\n  \u003ctext x=\"60\" y=\"100\" font-size=\"17\" fill=\"#516159\">Converting BC and Alberta forestry residue into exportable clean fuel\u003c/text>\n\n  \u003c!-- Feedstock block -->\n  \u003crect x=\"60\" y=\"190\" width=\"170\" height=\"150\" rx=\"12\" fill=\"#1a3d35\"/>\n  \u003ctext x=\"145\" y=\"250\" font-size=\"19\" font-weight=\"700\" fill=\"#ffffff\" text-anchor=\"middle\">Forestry\u003c/text>\n  \u003ctext x=\"145\" y=\"276\" font-size=\"19\" font-weight=\"700\" fill=\"#ffffff\" text-anchor=\"middle\">residue\u003c/text>\n  \u003ctext x=\"145\" y=\"306\" font-size=\"13\" fill=\"#9ac9ad\" text-anchor=\"middle\">Slash, bark,\u003c/text>\n  \u003ctext x=\"145\" y=\"324\" font-size=\"13\" fill=\"#9ac9ad\" text-anchor=\"middle\">sawdust, mill waste\u003c/text>\n\n  \u003c!-- connectors from feedstock -->\n  \u003cpath d=\"M230 230 H280\" stroke=\"#70bf70\" stroke-width=\"3\" fill=\"none\"/>\n  \u003cpath d=\"M230 300 H280\" stroke=\"#70bf70\" stroke-width=\"3\" fill=\"none\"/>\n\n  \u003c!-- Row 1: Biomethanol -->\n  \u003ctext x=\"290\" y=\"158\" font-size=\"14\" font-weight=\"700\" fill=\"#2f7f60\" letter-spacing=\"1.5\">PRIMARY PATHWAY  \u00b7  BIOMETHANOL\u003c/text>\n  \u003cg>\n    \u003crect x=\"290\" y=\"180\" width=\"150\" height=\"100\" rx=\"10\" fill=\"#ffffff\" stroke=\"#cfe0d3\" stroke-width=\"1.5\"/>\n    \u003ctext x=\"365\" y=\"222\" font-size=\"15\" font-weight=\"600\" fill=\"#1a3d35\" text-anchor=\"middle\">Gasification\u003c/text>\n    \u003ctext x=\"365\" y=\"244\" font-size=\"13\" fill=\"#516159\" text-anchor=\"middle\">to syngas\u003c/text>\n\n    \u003crect x=\"470\" y=\"180\" width=\"150\" height=\"100\" rx=\"10\" fill=\"#ffffff\" stroke=\"#cfe0d3\" stroke-width=\"1.5\"/>\n    \u003ctext x=\"545\" y=\"216\" font-size=\"15\" font-weight=\"600\" fill=\"#1a3d35\" text-anchor=\"middle\">Syngas cleanup\u003c/text>\n    \u003ctext x=\"545\" y=\"238\" font-size=\"15\" font-weight=\"600\" fill=\"#1a3d35\" text-anchor=\"middle\">+ synthesis\u003c/text>\n    \u003ctext x=\"545\" y=\"258\" font-size=\"12\" fill=\"#516159\" text-anchor=\"middle\">CO + 2H2 to CH3OH\u003c/text>\n\n    \u003crect x=\"650\" y=\"180\" width=\"150\" height=\"100\" rx=\"10\" fill=\"#2f7f60\"/>\n    \u003ctext x=\"725\" y=\"222\" font-size=\"15\" font-weight=\"700\" fill=\"#ffffff\" text-anchor=\"middle\">Methanol\u003c/text>\n    \u003ctext x=\"725\" y=\"244\" font-size=\"12\" fill=\"#d9f2db\" text-anchor=\"middle\">liquid, storable\u003c/text>\n\n    \u003crect x=\"830\" y=\"180\" width=\"120\" height=\"100\" rx=\"10\" fill=\"#eef4ec\" stroke=\"#cfe0d3\" stroke-width=\"1.5\"/>\n    \u003ctext x=\"890\" y=\"216\" font-size=\"13\" font-weight=\"600\" fill=\"#1a3d35\" text-anchor=\"middle\">Marine\u003c/text>\n    \u003ctext x=\"890\" y=\"236\" font-size=\"13\" font-weight=\"600\" fill=\"#1a3d35\" text-anchor=\"middle\">industrial\u003c/text>\n    \u003ctext x=\"890\" y=\"256\" font-size=\"13\" font-weight=\"600\" fill=\"#1a3d35\" text-anchor=\"middle\">export\u003c/text>\n\n    \u003cpath d=\"M440 230 H470 M620 230 H650 M800 230 H830\" stroke=\"#70bf70\" stroke-width=\"3\" fill=\"none\"/>\n  \u003c/g>\n\n  \u003c!-- Row 2: RNG -->\n  \u003ctext x=\"290\" y=\"372\" font-size=\"14\" font-weight=\"700\" fill=\"#2f7f60\" letter-spacing=\"1.5\">COMPLEMENTARY PATHWAY  \u00b7  RENEWABLE NATURAL GAS\u003c/text>\n  \u003cg>\n    \u003crect x=\"290\" y=\"392\" width=\"150\" height=\"100\" rx=\"10\" fill=\"#ffffff\" stroke=\"#cfe0d3\" stroke-width=\"1.5\"/>\n    \u003ctext x=\"365\" y=\"428\" font-size=\"15\" font-weight=\"600\" fill=\"#1a3d35\" text-anchor=\"middle\">Gasification or\u003c/text>\n    \u003ctext x=\"365\" y=\"450\" font-size=\"15\" font-weight=\"600\" fill=\"#1a3d35\" text-anchor=\"middle\">digestion\u003c/text>\n    \u003ctext x=\"365\" y=\"470\" font-size=\"12\" fill=\"#516159\" text-anchor=\"middle\">to biogas / syngas\u003c/text>\n\n    \u003crect x=\"470\" y=\"392\" width=\"150\" height=\"100\" rx=\"10\" fill=\"#ffffff\" stroke=\"#cfe0d3\" stroke-width=\"1.5\"/>\n    \u003ctext x=\"545\" y=\"434\" font-size=\"15\" font-weight=\"600\" fill=\"#1a3d35\" text-anchor=\"middle\">Upgrade to\u003c/text>\n    \u003ctext x=\"545\" y=\"456\" font-size=\"15\" font-weight=\"600\" fill=\"#1a3d35\" text-anchor=\"middle\">pipeline RNG\u003c/text>\n\n    \u003crect x=\"650\" y=\"392\" width=\"150\" height=\"100\" rx=\"10\" fill=\"#2f7f60\"/>\n    \u003ctext x=\"725\" y=\"434\" font-size=\"15\" font-weight=\"700\" fill=\"#ffffff\" text-anchor=\"middle\">Biomethane\u003c/text>\n    \u003ctext x=\"725\" y=\"456\" font-size=\"12\" fill=\"#d9f2db\" text-anchor=\"middle\">&gt;97% CH4\u003c/text>\n\n    \u003crect x=\"830\" y=\"392\" width=\"120\" height=\"100\" rx=\"10\" fill=\"#eef4ec\" stroke=\"#cfe0d3\" stroke-width=\"1.5\"/>\n    \u003ctext x=\"890\" y=\"428\" font-size=\"13\" font-weight=\"600\" fill=\"#1a3d35\" text-anchor=\"middle\">Grid\u003c/text>\n    \u003ctext x=\"890\" y=\"448\" font-size=\"13\" font-weight=\"600\" fill=\"#1a3d35\" text-anchor=\"middle\">injection /\u003c/text>\n    \u003ctext x=\"890\" y=\"468\" font-size=\"13\" font-weight=\"600\" fill=\"#1a3d35\" text-anchor=\"middle\">community\u003c/text>\n\n    \u003cpath d=\"M440 442 H470 M620 442 H650 M800 442 H830\" stroke=\"#70bf70\" stroke-width=\"3\" fill=\"none\"/>\n  \u003c/g>\n\n  \u003ctext x=\"60\" y=\"540\" font-size=\"13\" fill=\"#8a9690\">Source: Solum Energy framework, \"From Forest Waste to Clean Fuel,\" June 2026.\u003c/text>\n\u003c/svg>\n\n      \u003c/figure>\n\n      \u003cdiv class=\"article-body reveal\" data-d=\"1\">\n        \u003cp class=\"article-lead\">British Columbia and Alberta may already contain most of the pieces of a regional renewable fuels industry. That does not mean the industry exists. The harder question is whether the biomass, infrastructure, ports, and policy can be organized into pathways credible enough to build.\u003c/p>\n\n        \u003cp>The forest sector creates the feedstock automatically. British Columbia generates more than seven million cubic metres of forestry residue every year, much of it open-burned in slash piles or left to decay in cutblocks. Alberta's boreal forest covers roughly 381,000 square kilometres, about 60 percent of the province, and its mills produce millions of tonnes of sawdust, bark, and harvest slash. Open burning releases carbon with zero economic return. Together these two provinces hold one of the largest untapped biomass platforms in North America. The coordination problem is not scarcity. It is converting that waste into fuel.\u003c/p>\n\n        \u003ch2>The platform already exists\u003c/h2>\n        \u003cp>This is not a metaphor. It is a description of infrastructure already in the ground. Prince George anchors the BC Interior node, with two operating pulp mills, Northwood and the Prince George Pulp and Paper Mill, carrying combined cogeneration capacity above 60 megawatts. Arbios Biotech has completed the world's largest hydrothermal liquefaction facility in the city, Expander Energy is running gasification feasibility work nearby, and Canfor Pulp has provincial funding to convert wood waste into renewable energy. It is the most industrially active biomass node in Canada right now.\u003c/p>\n\n        \u003cp>The Alberta Industrial Heartland northeast of Edmonton is a different kind of platform. It is already Canada's largest hydrogen-producing region. Air Products brought a hydrogen liquefaction facility with carbon capture into production in 2025, designed for up to 1,500 tonnes of hydrogen per day with more than 90 percent of emissions captured. The Alberta Carbon Trunk Line has operated since 2020, and Imperial Oil's Strathcona renewable diesel complex began commercial production in mid-2025, producing over one billion litres a year. Connecting these interior platforms to Pacific markets is the Port of Prince Rupert, where the 1.35 billion dollar Ridley Island Energy Export Facility is set to complete marine infrastructure in 2026 with capacity for methanol. The port moved 26.3 million tonnes of cargo in 2025, a 14 percent increase, and has signed a green shipping corridor agreement linking it to buyers in Asia and the Middle East.\u003c/p>\n\n        \u003cblockquote>The platform exists. The industry does not, yet. Methanol is useful because it turns that platform into a concrete test.\u003c/blockquote>\n\n        \u003ch2>Two pathways, matched to each region\u003c/h2>\n        \u003cp>The pathway has to fit the region, and BC and Alberta are not the same. BC's strength is biomass. Its Interior holds dense networks of forestry residue, pulp infrastructure, cogeneration, rail, and skilled process-industry labour. The most credible BC pathway is biomethanol: woody residue is dried and sized, gasified into syngas, cleaned, and synthesized into methanol, a liquid, storable, exportable fuel. That same biomass can also be converted to renewable natural gas, either through gasification and methanation or through anaerobic digestion of wetter inputs, then upgraded to pipeline quality and injected into the existing gas grid at a lower capital entry point than methanol. Solum's Williams Lake RNG project and Vancouver Island biomethanol work show both pathways are already active in the field.\u003c/p>\n\n        \u003cp>Alberta begins differently. It lacks comparable forestry biomass in its heartland but holds large-scale hydrogen production and world-class carbon capture. Its most credible route is blue methanol: hydrogen from natural gas with carbon captured and stored, combined with a CO2 source to synthesize methanol for export. A combined provincial model is also possible, with BC biomethanol and Alberta blue methanol both moving by rail to Prince Rupert for blending and export. The carbon intensities and risks differ, but the infrastructure and the end customer are shared.\u003c/p>\n\n        \u003ch2>Scale, revenue, and the discipline it requires\u003c/h2>\n        \u003cp>Scale is a relationship, not a number. A minimum-efficient biomethanol facility needs roughly 200,000 to 500,000 tonnes of dry biomass a year, which sets a catchment radius of about 75 to 150 kilometres by road or rail. Too small and the fixed costs of gasification and synthesis cannot be recovered. Too large and the plant competes against itself for feedstock. A hub-and-spoke model, with secondary nodes feeding a central conversion facility, is a credible answer in both provinces.\u003c/p>\n\n        \u003cp>The revenue stack is real but not automatic. It draws on the BC Low Carbon Fuel Standard, among the highest-value such markets in North America, which since April 2025 prefers Canadian-produced fuels. It adds Canada's Clean Fuel Regulations, operational since July 2023 and requiring a 15 percent carbon-intensity reduction by 2030, alongside federal Investment Tax Credits, Natural Resources Canada's Clean Fuels Fund, and Emissions Reduction Alberta, which announced 28 million dollars in February 2026 for forestry and agricultural waste conversion. These incentives are genuine, but each requires independently verified lifecycle carbon intensity, durable policy, and enforceable contracts that projects routinely underestimate.\u003c/p>\n\n        \u003cp>That is why the first project matters so much. Western Canada has watched promising efforts stall, from Parkland's shelved 600 million dollar Burnaby expansion to the Kalama methanol project, which showed that land, ports, and investment promises are not enough without a credible emissions profile and community legitimacy. A disciplined first facility has to prove reliable contracted feedstock, an independently verified carbon intensity, integration with existing sites and rail rather than greenfield everything, real offtake contracts rather than letters of intent, and First Nations co-ownership formalized before financial close rather than added as an afterthought. Public legitimacy and commercial financeability are not separate concerns. A project that lacks community acceptance is commercially fragile.\u003c/p>\n\n        \u003cp>Very few regions in the world hold biomass at scale, industrial infrastructure, carbon capture expertise, clean power, the right rail corridors, and port capacity positioned exactly where a maritime fuel transition is crystallizing. BC and Alberta do, at the same moment. The assets exist. The question is whether the coordination, capital, and institutional discipline to turn them into an operating industry can be assembled before the window of demand, policy, and infrastructure timing narrows. The framework exists. The work begins now.\u003c/p>\n\n        \u003cp class=\"article-lead\">This article distills Solum Energy's June 2026 framework, \"What Does It Take to Build a Regional Renewable Fuels Industry? The Case for British Columbia and Alberta,\" by Alan Kneisz. It is a framework analysis, not a feasibility study or investment recommendation.\u003c/p>\n      \u003c/div>\n\n      \u003cdiv class=\"article-foot reveal\" data-d=\"2\">\n        \u003ca class=\"btn btn-primary\" href=\"https://forms.office.com/Pages/ResponsePage.aspx?id=vCMz4rcbukWS799uzktcoOvDG3h3Hd9Ium23QADs16ZUMlZIQllWRDBNREpORU1ZQzRVN0s2WlNFTy4u\" target=\"_blank\" rel=\"noopener\">Partner With Us \u003cspan class=\"arr\">\u2192\u003c/span>\u003c/a>\n        \u003ca class=\"btn btn-ghost\" href=\"../blog.html\">Back to blog\u003c/a>\n      \u003c/div>\n    \u003c/div>\n  \u003c/article>\n\n\u003c/main>\n\n\u003c!-- ============ FOOTER ============ -->\n\n\n\n\u003c/body>\n\u003c/html>\n"}, {"title": "2026 is the year Canada's clean fuel rules get real, and ownership will decide who benefits", "category": "Policy & Markets", "date": "June 28, 2026", "url": "https://solumenergy.ca/blog/clean-fuel-2026-turning-point.html", "sources": [{"label": "Unlocking the Future of Canada's Clean Fuel Market", "url": "https://www.ccarbon.info/article/unlocking-the-future-of-canadas-clean-fuel-market-policy-shifts-market-insights-and-near-term-projections/"}, {"label": "Canada explores protectionist biofuel policies", "url": "https://www.wastedive.com/news/canada-cfr-amendment-comments-rng-coalition/811811/"}, {"label": "Canada's clean fuel program sees 417 percent jump in RNG", "url": "https://www.wastedive.com/news/canada-clean-fuels-market-rng-increase/757558/"}, {"label": "Regenerative Energy National Survey 2026", "url": "https://indigenouscleanenergy.com/regenerative-energy-national-survey-2026/"}, {"label": "Strong response to 2025 call for power", "url": "https://news.gov.bc.ca/releases/2026ECS0014-000552"}], "slug": "clean-fuel-2026-turning-point", "test": true, "summary": "The Clean Fuel Regulations now require real, incremental low-carbon fuel rather than banked credits, RNG capacity is on track to triple from 9.3 PJ to 28.9 PJ, a 370 million dollar federal incentive is backing domestic production, and First Nations have become the third-largest owners of clean energy assets in Canada.", "linkedin": "2026 is the year Canada's clean fuel rules stopped rewarding intentions and started demanding real, incremental low-carbon fuel. RNG capacity is set to triple and a new 370 million dollar federal incentive is backing domestic production, while First Nations have become the third-largest owners of clean energy assets in the country. The question is no longer whether clean fuel gets built in Canada, but who will own it.\n\nRead the full piece: https://solumenergy.ca/blog/clean-fuel-2026-turning-point.html", "preview": "\u003c!DOCTYPE html>\n\u003chtml lang=\"en-CA\">\n\u003chead>\n\u003cmeta charset=\"UTF-8\" />\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n\u003ctitle>2026: The Year Canada's Clean Fuel Rules Get Real | Solum Energy Blog\u003c/title>\n\u003cmeta name=\"description\" content=\"Canada's Clean Fuel Regulations now require real, incremental low-carbon fuel, RNG capacity is set to triple, and First Nations have become the third-largest owners of clean energy assets. Here is what it means.\" />\n\u003cmeta name=\"theme-color\" content=\"#1a3d35\" />\n\u003clink rel=\"canonical\" href=\"https://solumenergy.ca/blog/clean-fuel-2026-turning-point.html\" />\n\n\u003clink rel=\"preconnect\" href=\"https://fonts.googleapis.com\" />\n\u003clink rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin />\n\u003clink href=\"https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap\" rel=\"stylesheet\" />\n\u003cstyle>/* ============================================================\n   Solum Energy \u2014 redesign stylesheet\n   Palette: forest #1a3d35 \u00b7 emerald #2f7f60 \u00b7 green #70bf70\n            sage #9ac9ad \u00b7 mint #d9f2db\n   ============================================================ */\n:root{\n  --forest:#1a3d35; --forest-deep:#12302a; --emerald:#2f7f60;\n  --green:#70bf70; --sage:#9ac9ad; --mint:#d9f2db;\n  --paper:#f5f8f4; --paper-2:#eef4ec; --ink:#15241f; --slate:#516159;\n  --line:rgba(26,61,53,.12); --line-soft:rgba(26,61,53,.08);\n  --display:'Schibsted Grotesk',system-ui,sans-serif;\n  --body:'Hanken Grotesk',system-ui,sans-serif;\n  --mono:'IBM Plex Mono',ui-monospace,monospace;\n  --maxw:max(1240px,calc(620px + 50vw)); --gutter:clamp(20px,5vw,64px);\n  --r-lg:24px; --r-md:16px; --r-sm:10px;\n  --shadow:0 18px 50px -20px rgba(12,40,32,.35);\n  --shadow-sm:0 8px 24px -12px rgba(12,40,32,.28);\n}\n*{box-sizing:border-box;}\nhtml{scroll-behavior:smooth;scroll-padding-top:92px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}\nbody{margin:0;font-family:var(--body);color:var(--ink);background:var(--paper);font-size:17px;line-height:1.6;overflow-x:hidden;}\nimg{max-width:100%;display:block;}\na{color:inherit;text-decoration:none;}\nh1,h2,h3,h4{font-family:var(--display);font-weight:700;letter-spacing:-0.025em;line-height:1.04;margin:0;text-wrap:balance;color:var(--forest);}\np{margin:0;text-wrap:pretty;}\n::selection{background:var(--sage);color:var(--forest-deep);}\n\n/* ---------- shared layout ---------- */\n.wrap{max-width:var(--maxw);margin-inline:auto;padding-inline:var(--gutter);}\n.eyebrow{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--emerald);display:inline-flex;align-items:center;gap:10px;}\n.eyebrow::before{content:\"\";width:22px;height:1.5px;background:var(--green);display:inline-block;}\n.eyebrow.center{justify-content:center;}\n.section{padding:clamp(72px,11vw,140px) 0;position:relative;}\n.section-head{max-width:62ch;}\n.section-head h2{font-size:clamp(32px,4.6vw,52px);margin-top:22px;}\n.section-head p{font-size:clamp(17px,2vw,20px);color:var(--slate);margin-top:22px;max-width:54ch;}\n.lead{font-size:clamp(18px,2.2vw,21px);color:var(--slate);}\n\n/* ---------- buttons ---------- */\n.btn{font-family:var(--body);font-weight:600;font-size:15.5px;border-radius:999px;padding:14px 26px;display:inline-flex;align-items:center;gap:9px;cursor:pointer;border:1.5px solid transparent;transition:transform .2s,box-shadow .2s,background .2s,color .2s,border-color .2s;white-space:nowrap;}\n.btn .arr{transition:transform .2s;}\n.btn:hover .arr{transform:translateX(4px);}\n.btn-primary{background:var(--forest);color:#fff;}\n.btn-primary:hover{background:var(--forest-deep);transform:translateY(-2px);box-shadow:var(--shadow-sm);}\n.btn-light{background:var(--green);color:var(--forest-deep);}\n.btn-light:hover{background:var(--mint);transform:translateY(-2px);box-shadow:var(--shadow-sm);}\n.btn-ghost{background:transparent;color:var(--forest);border-color:var(--line);}\n.btn-ghost:hover{border-color:var(--emerald);color:var(--emerald);}\n.btn-ghost.on-dark{color:#fff;border-color:rgba(255,255,255,.34);}\n.btn-ghost.on-dark:hover{border-color:#fff;color:var(--mint);}\n\n/* ---------- header / nav ---------- */\n.site-header{position:fixed;inset:0 0 auto 0;z-index:50;transition:background .3s,box-shadow .3s,border-color .3s;border-bottom:1px solid transparent;}\n.site-header.scrolled{background:rgba(245,248,244,.82);backdrop-filter:saturate(1.4) blur(14px);border-bottom-color:var(--line-soft);box-shadow:0 6px 24px -18px rgba(12,40,32,.5);}\n.nav{display:flex;align-items:center;justify-content:space-between;height:148px;transition:height .35s cubic-bezier(.4,0,.2,1);}\n.brand{display:flex;align-items:center;gap:14px;}\n.brand img{height:38px;width:auto;transition:height .35s cubic-bezier(.4,0,.2,1);}\n.brand .wordmark{font-family:var(--display);font-weight:700;font-size:21px;letter-spacing:.08em;color:var(--forest);transition:font-size .35s cubic-bezier(.4,0,.2,1);}\n/* large at the top of the page */\n.site-header .brand img{height:112px;}\n.site-header .brand .wordmark{font-size:28px;}\n/* shrink back to the original size once scrolled */\n.site-header.scrolled .nav{height:76px;}\n.site-header.scrolled .brand img{height:38px;}\n.site-header.scrolled .brand .wordmark{font-size:21px;}\n.nav-links{display:flex;align-items:center;gap:34px;}\n.nav-links a.link{font-size:15.5px;font-weight:500;color:var(--ink);opacity:.82;position:relative;padding:4px 0;transition:opacity .2s,color .2s;}\n.nav-links a.link::after{content:\"\";position:absolute;left:0;right:0;bottom:-2px;height:1.5px;background:var(--emerald);transform:scaleX(0);transform-origin:left;transition:transform .25s;}\n.nav-links a.link:hover{opacity:1;color:var(--emerald);}\n.nav-links a.link:hover::after,.nav-links a.link.active::after{transform:scaleX(1);}\n.nav-links a.link.active{opacity:1;color:var(--emerald);}\n.nav-cta{display:flex;align-items:center;gap:14px;}\n.nav-inline-cta{display:none;}\n.nav-toggle{display:none;background:none;border:none;cursor:pointer;width:42px;height:42px;flex-direction:column;justify-content:center;gap:5px;}\n.nav-toggle span{display:block;height:2px;width:24px;background:var(--forest);border-radius:2px;transition:.25s;}\n\n/* ---------- hero (Direction A) ---------- */\n.hero{padding-top:148px;background:var(--paper);}\n.hero-grid{display:grid;grid-template-columns:1.04fr .96fr;min-height:calc(100svh - 148px);align-items:stretch;}\n.hero-left{display:flex;flex-direction:column;justify-content:center;padding:clamp(40px,6vw,72px) clamp(20px,4vw,40px) clamp(40px,6vw,72px) 0;}\n.hero-left .eyebrow{margin-bottom:26px;}\n.hero h1{font-size:clamp(40px,6vw,70px);max-width:13ch;}\n.hero h1 .accent{color:var(--emerald);}\n.hero-sub{font-size:clamp(17px,2.1vw,20px);color:var(--slate);max-width:46ch;margin:28px 0 36px;}\n.hero-cta{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}\n.hero-stats{display:grid;grid-template-columns:repeat(3,auto);gap:clamp(28px,4vw,48px);margin-top:clamp(40px,6vw,58px);padding-top:30px;border-top:1px solid var(--line);}\n.hero-stats .stat .n{font-family:var(--display);font-weight:700;font-size:clamp(26px,3.4vw,34px);color:var(--forest);letter-spacing:-.02em;}\n.hero-stats .stat .l{font-size:13px;color:var(--slate);margin-top:4px;max-width:18ch;}\n.hero-right{position:relative;overflow:hidden;border-radius:var(--r-lg) 0 0 var(--r-lg);}\n.hero-right img{width:100%;height:100%;object-fit:cover;will-change:transform;}\n.hero-right::after{content:\"\";position:absolute;inset:0;background:linear-gradient(105deg,var(--paper) 0%,rgba(245,248,244,0) 20%);pointer-events:none;}\n.hero-badge{position:absolute;left:26px;bottom:26px;z-index:3;background:rgba(18,48,42,.62);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:var(--r-md);padding:14px 18px;display:flex;align-items:center;gap:13px;max-width:300px;}\n.hero-badge .dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(112,191,112,.3);flex:none;}\n.hero-badge .t{font-size:13.5px;line-height:1.35;}\n.hero-badge .t b{color:var(--mint);font-weight:600;}\n\n/* ---------- logo / context strip ---------- */\n.context-strip{background:var(--forest);color:#fff;}\n.context-strip .wrap{display:flex;align-items:center;gap:clamp(24px,5vw,64px);flex-wrap:wrap;padding-block:26px;justify-content:space-between;}\n.context-strip .item{display:flex;align-items:center;gap:12px;font-size:14.5px;color:rgba(255,255,255,.84);}\n.context-strip .item svg{flex:none;color:var(--green);}\n\n/* ---------- mission ---------- */\n.mission .wrap{display:grid;grid-template-columns:.85fr 1.15fr;gap:clamp(40px,7vw,90px);align-items:start;}\n.mission .big{font-family:var(--display);font-weight:600;font-size:clamp(26px,3.4vw,38px);line-height:1.16;letter-spacing:-.02em;color:var(--forest);text-wrap:balance;}\n.mission .big em{font-style:normal;color:var(--emerald);}\n.mission .body p+p{margin-top:20px;}\n.mission .body .lead{color:var(--slate);}\n.mission .define{margin-top:30px;padding:22px 24px;border:1px solid var(--line);border-radius:var(--r-md);background:#fff;}\n.mission .define .term{font-family:var(--display);font-weight:700;color:var(--forest);font-size:19px;}\n.mission .define .term span{font-family:var(--mono);font-size:12px;color:var(--emerald);letter-spacing:.08em;margin-left:8px;}\n.mission .define p{font-size:15px;color:var(--slate);margin-top:6px;}\n\n/* ---------- pillars ---------- */\n.pillars{background:var(--paper-2);}\n.pillars-intro{display:grid;grid-template-columns:1.1fr .9fr;gap:clamp(32px,5vw,64px);align-items:center;margin-bottom:clamp(8px,2vw,20px);}\n.pillars-intro .section-head{max-width:none;}\n.pillars-intro-media{border-radius:var(--r-lg);overflow:hidden;aspect-ratio:4/3;box-shadow:var(--shadow);}\n.pillars-intro-media img{width:100%;height:100%;object-fit:cover;display:block;}\n.pillar{display:grid;grid-template-columns:1fr 1fr;gap:clamp(36px,6vw,80px);align-items:center;padding:clamp(48px,7vw,80px) 0;border-top:1px solid var(--line);}\n.pillar:first-of-type{border-top:none;}\n.pillar.flip .pillar-media{order:2;}\n.pillar-media{position:relative;border-radius:var(--r-lg);overflow:hidden;aspect-ratio:5/4;box-shadow:var(--shadow);}\n.pillar-media img{width:100%;height:100%;object-fit:cover;will-change:transform;}\n.pillar-media .tag{position:absolute;top:18px;left:18px;background:rgba(18,48,42,.7);backdrop-filter:blur(6px);color:#fff;font-family:var(--mono);font-size:11.5px;letter-spacing:.14em;padding:8px 14px;border-radius:999px;}\n.pillar-num{font-family:var(--mono);font-size:13px;color:var(--emerald);letter-spacing:.2em;}\n.pillar-body h3{font-size:clamp(26px,3.4vw,38px);margin:16px 0 18px;}\n.pillar-body>p{color:var(--slate);font-size:clamp(16px,1.9vw,18.5px);max-width:48ch;}\n.pillar-list{list-style:none;margin:28px 0 0;padding:0;display:grid;gap:2px;}\n.pillar-list li{display:grid;grid-template-columns:auto 1fr;gap:16px;padding:18px 0;border-top:1px solid var(--line);align-items:start;}\n.pillar-list .ic{width:38px;height:38px;border-radius:10px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;color:var(--emerald);flex:none;}\n.pillar-list .ic svg{width:19px;height:19px;}\n.pillar-list h4{font-size:16.5px;font-family:var(--display);color:var(--forest);}\n.pillar-list p{font-size:14.5px;color:var(--slate);margin-top:4px;}\n\n/* ---------- partnership ---------- */\n.partner{background:var(--forest);color:#fff;position:relative;overflow:hidden;}\n.partner .eyebrow{color:var(--green);}\n.partner .eyebrow::before{background:var(--green);}\n.partner h2{color:#fff;}\n.partner .section-head p{color:rgba(255,255,255,.78);}\n.partner .intro{display:grid;grid-template-columns:1fr;gap:clamp(36px,6vw,72px);align-items:end;}\n.partner .intro .equity{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:var(--r-md);padding:26px 28px;}\n.partner .intro .equity .n{font-family:var(--display);font-weight:700;font-size:clamp(40px,6vw,64px);color:var(--green);line-height:1;letter-spacing:-.03em;}\n.partner .intro .equity .l{font-size:15px;color:rgba(255,255,255,.82);margin-top:10px;max-width:30ch;}\n.process{margin-top:clamp(48px,7vw,72px);}\n.process-title{color:#fff;font-size:clamp(20px,2.6vw,26px);font-weight:600;letter-spacing:-.01em;max-width:30ch;margin-bottom:clamp(28px,4vw,40px);}\n.process-track{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;counter-reset:step;}\n.process-step{position:relative;padding-top:34px;}\n.process-step::before{counter-increment:step;content:counter(step,decimal-leading-zero);position:absolute;top:0;left:0;font-family:var(--mono);font-size:12px;color:var(--green);letter-spacing:.1em;}\n.process-step::after{content:\"\";position:absolute;top:6px;left:34px;right:-9px;height:1px;background:linear-gradient(90deg,rgba(112,191,112,.5),rgba(112,191,112,.12));}\n.process-step:last-child::after{display:none;}\n.process-step .dot{position:absolute;top:1px;left:32px;width:11px;height:11px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(112,191,112,.18);}\n.process-step h4{font-size:17px;color:#fff;margin-bottom:8px;}\n.process-step p{font-size:14px;color:rgba(255,255,255,.7);}\n.partner-media{margin-top:clamp(48px,7vw,72px);position:relative;border-radius:var(--r-lg);overflow:hidden;aspect-ratio:21/8;box-shadow:var(--shadow);}\n.partner-media img{width:100%;height:100%;object-fit:cover;will-change:transform;}\n.partner-media .quote{position:absolute;left:0;bottom:0;right:0;padding:clamp(28px,5vw,52px);background:linear-gradient(transparent,rgba(12,40,32,.85));}\n.partner-media .quote p{font-family:var(--display);font-weight:600;font-size:clamp(18px,2.6vw,28px);color:#fff;max-width:24ch;line-height:1.2;letter-spacing:-.02em;}\n.partner-media .quote .who{font-family:var(--mono);font-size:12.5px;color:var(--mint);letter-spacing:.1em;margin-top:14px;}\n\n/* ---------- projects / map ---------- */\n.projects{background:var(--paper);}\n.map-layout{display:flex;justify-content:center;margin-top:clamp(40px,6vw,60px);}\n.map-wrap{position:relative;width:100%;max-width:1080px;aspect-ratio:1/1;}\n.canada-map{width:100%;height:100%;object-fit:contain;display:block;filter:drop-shadow(0 16px 40px rgba(12,40,32,.18));}\n\n/* point markers */\n.poi{position:absolute;width:0;height:0;background:none;border:none;padding:0;cursor:pointer;z-index:2;}\n.poi .pin{position:absolute;left:0;top:0;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:var(--green);border:2.5px solid #fff;box-shadow:0 2px 8px rgba(12,40,32,.45);transition:transform .2s,background .2s,box-shadow .2s;}\n.poi .pin::before{content:\"\";position:absolute;inset:-7px;border-radius:50%;border:2px solid var(--green);opacity:.6;animation:poi-pulse 2.4s ease-out infinite;}\n@keyframes poi-pulse{0%{transform:scale(.6);opacity:.6;}70%{opacity:0;}100%{transform:scale(1.6);opacity:0;}}\n.poi .poi-label{position:absolute;left:16px;top:0;transform:translateY(-50%);font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--forest);background:rgba(245,248,244,.82);padding:2px 7px;border-radius:6px;white-space:nowrap;backdrop-filter:blur(2px);transition:opacity .2s;}\n.poi:hover,.poi:focus-visible,.poi.active{z-index:6;outline:none;}\n.poi:hover .pin,.poi:focus-visible .pin,.poi.active .pin{background:var(--mint);transform:translate(-50%,-50%) scale(1.45);}\n.poi:focus-visible .pin{box-shadow:0 0 0 4px rgba(112,191,112,.45),0 2px 8px rgba(12,40,32,.35);}\n.poi:hover .poi-label,.poi:focus-visible .poi-label,.poi.active .poi-label{opacity:0;}\n\n/* hover tooltip anchored to the pin */\n.poi-card{position:absolute;left:22px;top:0;transform:translateY(-50%) translateX(-6px);width:248px;max-width:62vw;background:#fff;border:1px solid var(--line);border-radius:var(--r-md);box-shadow:0 20px 54px -16px rgba(12,40,32,.55);padding:16px 18px;text-align:left;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .2s,transform .2s;z-index:7;}\n.poi:hover .poi-card,.poi:focus-visible .poi-card,.poi.active .poi-card{opacity:1;visibility:visible;transform:translateY(-50%) translateX(0);}\n.poi-card::before{content:\"\";position:absolute;left:-7px;top:50%;transform:translateY(-50%) rotate(45deg);width:12px;height:12px;background:#fff;border-left:1px solid var(--line);border-bottom:1px solid var(--line);}\n/* right-side pins: open the tooltip to the left */\n.poi--flip .poi-card{left:auto;right:22px;transform:translateY(-50%) translateX(6px);}\n.poi--flip:hover .poi-card,.poi--flip:focus-visible .poi-card,.poi--flip.active .poi-card{transform:translateY(-50%) translateX(0);}\n.poi--flip .poi-card::before{left:auto;right:-7px;border-left:none;border-bottom:none;border-right:1px solid var(--line);border-top:1px solid var(--line);}\n.poi--flip .poi-label{left:auto;right:16px \n.sector-pill{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12px;letter-spacing:.02em;color:var(--forest);background:#fff;border:1px solid var(--sage);border-radius:999px;padding:7px 14px;white-space:nowrap;}\n.sector-pill .sd{width:7px;height:7px;border-radius:50%;background:var(--emerald);flex:none;}\n.geo{display:inline-flex;align-items:center;gap:9px;color:var(--slate);font-size:14.5px;line-height:1.3;}\n.geo svg{width:17px;height:17px;color:var(--emerald);flex:none;}\n\n/* ---------- impact ---------- */\n.impact{background:var(--paper);}\n.impact-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:#fff;margin-top:clamp(40px,6vw,56px);}\n.impact-cell{padding:clamp(28px,3.5vw,40px);border-right:1px solid var(--line);position:relative;}\n.impact-cell:last-child{border-right:none;}\n.impact-cell .n{font-family:var(--display);font-weight:700;font-size:clamp(38px,5vw,58px);color:var(--forest);letter-spacing:-.03em;line-height:1;}\n.impact-cell .n .suf{color:var(--emerald);}\n.impact-cell .l{font-size:14.5px;color:var(--slate);margin-top:12px;max-width:22ch;}\n.impact-note{margin-top:24px;font-size:13px;color:var(--slate);font-family:var(--mono);letter-spacing:.02em;}\n\n/* ---------- faq (lightweight, SEO) ---------- */\n.faq .wrap{display:grid;grid-template-columns:.8fr 1.2fr;gap:clamp(36px,6vw,72px);align-items:start;}\n.faq-list{display:grid;gap:0;}\n.faq-item{border-top:1px solid var(--line);}\n.faq-item:last-child{border-bottom:1px solid var(--line);}\n.faq-q{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:24px 0;display:flex;justify-content:space-between;align-items:center;gap:24px;font-family:var(--display);font-weight:600;font-size:clamp(17px,2vw,20px);color:var(--forest);}\n.faq-q .pm{flex:none;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;color:var(--emerald);transition:.25s;position:relative;}\n.faq-q .pm::before,.faq-q .pm::after{content:\"\";position:absolute;background:currentColor;border-radius:2px;}\n.faq-q .pm::before{width:11px;height:1.6px;}\n.faq-q .pm::after{width:1.6px;height:11px;transition:transform .25s;}\n.faq-item.open .pm{background:var(--emerald);border-color:var(--emerald);color:#fff;}\n.faq-item.open .pm::after{transform:scaleY(0);}\n.faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease;}\n.faq-a p{padding:0 0 24px;color:var(--slate);font-size:16px;max-width:60ch;}\n\n/* ---------- contact / CTA ---------- */\n.contact{background:linear-gradient(180deg,var(--forest) 0%,var(--forest-deep) 100%);color:#fff;}\n.contact .panel{display:grid;grid-template-columns:1.1fr .9fr;gap:clamp(36px,6vw,72px);align-items:center;}\n.contact .eyebrow{color:var(--green);}\n.contact .eyebrow::before{background:var(--green);}\n.contact h2{color:#fff;font-size:clamp(32px,4.6vw,54px);}\n.contact p{color:rgba(255,255,255,.8);font-size:clamp(17px,2vw,20px);margin-top:22px;max-width:46ch;}\n.contact .cta-row{margin-top:34px;display:flex;gap:14px;flex-wrap:wrap;}\n.contact-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);border-radius:var(--r-lg);padding:clamp(28px,4vw,40px);}\n.contact-card h3{color:#fff;font-size:21px;}\n.contact-card .rows{margin-top:20px;display:grid;gap:2px;}\n.contact-card .row{display:flex;align-items:center;gap:14px;padding:14px 0;border-top:1px solid rgba(255,255,255,.12);font-size:15.5px;color:rgba(255,255,255,.86);}\n.contact-card .row:first-child{border-top:none;}\n.contact-card .row svg{color:var(--green);flex:none;}\n\n/* ---------- footer ---------- */\n.site-footer{background:var(--forest-deep);color:rgba(255,255,255,.7);padding:clamp(48px,7vw,72px) 0 36px;}\n.footer-top{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:40px;padding-bottom:40px;border-bottom:1px solid rgba(255,255,255,.12);}\n.footer-brand .brand .wordmark{color:#fff;}\n.footer-brand p{margin-top:18px;font-size:15px;max-width:34ch;}\n.footer-col h5{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--green);margin-bottom:16px;font-weight:500;}\n.footer-col a{display:block;padding:7px 0;font-size:15px;color:rgba(255,255,255,.74);transition:color .2s;}\n.footer-col a:hover{color:#fff;}\n.footer-bottom{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;padding-top:28px;font-size:13.5px;color:rgba(255,255,255,.5);}\n.footer-bottom .land{max-width:62ch;}\n\n/* ---------- blog ---------- */\n.blog-hero{padding-top:clamp(140px,16vw,184px);background:var(--paper);}\n.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(24px,3vw,36px);margin-top:clamp(40px,6vw,56px);}\n.post-card{display:flex;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;transition:transform .2s,box-shadow .2s;}\n.post-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);}\n.post-card-media{position:relative;display:block;aspect-ratio:16/10;overflow:hidden;}\n.post-card-media img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}\n.post-card:hover .post-card-media img{transform:scale(1.04);}\n.post-cat{position:absolute;top:14px;left:14px;background:rgba(18,48,42,.8);backdrop-filter:blur(6px);color:#fff;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:6px 12px;border-radius:999px;}\n.post-card-body{padding:22px 24px 26px;display:flex;flex-direction:column;flex:1;}\n.post-meta{font-family:var(--mono);font-size:12px;letter-spacing:.04em;color:var(--slate);text-transform:uppercase;}\n.post-card-body h3{font-size:21px;margin:12px 0 10px;color:var(--forest);line-height:1.18;letter-spacing:-.01em;}\n.post-card-body h3 a{color:inherit;transition:color .2s;}\n.post-card-body h3 a:hover{color:var(--emerald);}\n.post-card-body p{font-size:15px;color:var(--slate);line-height:1.55;flex:1;}\n.post-more{margin-top:18px;font-family:var(--body);font-weight:600;font-size:14.5px;color:var(--emerald);display:inline-flex;align-items:center;gap:8px;}\n.post-more .arr{transition:transform .2s;}\n.post-card:hover .post-more .arr{transform:translateX(4px);}\n\n/* ---------- blog post (article) ---------- */\n.article{padding:clamp(140px,16vw,184px) 0 clamp(64px,9vw,110px);background:var(--paper);}\n.article-back{font-family:var(--mono);font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--slate);display:inline-flex;align-items:center;gap:8px;transition:color .2s;}\n.article-back:hover{color:var(--emerald);}\n.article-back .arr-l{transition:transform .2s;}\n.article-back:hover .arr-l{transform:translateX(-4px);}\n.article-head{max-width:760px;margin:clamp(28px,4vw,44px) auto 0;text-align:center;}\n.post-cat-inline{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--emerald);}\n.article-title{font-size:clamp(32px,5vw,54px);color:var(--forest);margin:16px 0 22px;letter-spacing:-.025em;line-height:1.05;}\n.article-meta{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;font-family:var(--mono);font-size:13px;letter-spacing:.02em;color:var(--slate);}\n.article-hero{margin:clamp(36px,5vw,56px) auto 0;max-width:1000px;border-radius:var(--r-lg);overflow:hidden;aspect-ratio:16/9;box-shadow:var(--shadow);}\n.article-hero img{width:100%;height:100%;object-fit:cover;display:block;}\n.article-body{max-width:720px;margin:clamp(40px,6vw,60px) auto 0;font-size:18px;line-height:1.75;color:var(--ink);}\n.article-body > * + *{margin-top:24px;}\n.article-body .article-lead{font-size:clamp(20px,2.4vw,23px);line-height:1.5;color:var(--forest);font-weight:500;}\n.article-body h2{font-family:var(--display);font-size:clamp(24px,3vw,30px);color:var(--forest);letter-spacing:-.02em;margin-top:42px;}\n.article-body a{color:var(--emerald);text-decoration:underline;text-underline-offset:3px;}\n.article-body blockquote{margin:34px 0;padding:6px 0 6px 26px;border-left:3px solid var(--green);font-family:var(--display);font-weight:500;font-size:clamp(20px,2.6vw,26px);line-height:1.3;color:var(--forest);letter-spacing:-.01em;}\n.article-body ul{padding-left:22px;}\n.article-body li{margin-top:10px;}\n.article-foot{max-width:720px;margin:clamp(40px,6vw,56px) auto 0;padding-top:clamp(28px,4vw,40px);border-top:1px solid var(--line);display:flex;gap:14px;flex-wrap:wrap;}\n\n/* ---------- reveal animation ---------- */\n.reveal{opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);}\n.reveal.in{opacity:1;transform:none;}\n.reveal.shown{opacity:1;transform:none;transition:none;}\n.reveal[data-d=\"1\"]{transition-delay:.08s;}\n.reveal[data-d=\"2\"]{transition-delay:.16s;}\n.reveal[data-d=\"3\"]{transition-delay:.24s;}\n.reveal[data-d=\"4\"]{transition-delay:.32s;}\n@media (prefers-reduced-motion:reduce){\n  .reveal{opacity:1;transform:none;transition:none;}\n  html{scroll-behavior:auto;}\n}\n\n/* ---------- responsive ---------- */\n@media (max-width:1080px){\n  .hero-grid{grid-template-columns:1fr;min-height:0;}\n  .hero-left{padding:48px 0 40px;}\n  .hero-right{aspect-ratio:16/10;border-radius:var(--r-lg);}\n  .hero-right::after{display:none;}\n  .mission .wrap,.contact .panel,.faq .wrap{grid-template-columns:1fr;}\n  .map-wrap{max-width:100%;}\n  .partner .intro{grid-template-columns:1fr;gap:32px;}\n  .process-track{grid-template-columns:repeat(2,1fr);gap:28px 18px;}\n  .process-step::after{display:none;}\n  .impact-grid{grid-template-columns:repeat(2,1fr);}\n  .impact-cell:nth-child(2){border-right:none;}\n  .impact-cell:nth-child(-n+2){border-bottom:1px solid var(--line);}\n  .partner-media{aspect-ratio:16/9;}\n  .footer-top{grid-template-columns:1fr 1fr;}\n}\n/* nav collapses to hamburger earlier than the rest of the layout */\n@media (max-width:980px){\n  .blog-grid{grid-template-columns:repeat(2,1fr);}\n  .nav-links{position:fixed;inset:104px 0 auto 0;background:rgba(245,248,244,.97);backdrop-filter:blur(16px);flex-direction:column;align-items:stretch;gap:0;padding:12px var(--gutter) 28px;border-bottom:1px solid var(--line);transform:translateY(-12px);opacity:0;pointer-events:none;transition:.25s;box-shadow:var(--shadow-sm);}\n  .nav-links.open{transform:none;opacity:1;pointer-events:auto;}\n  .nav-links a.link{padding:16px 0;border-bottom:1px solid var(--line-soft);font-size:18px;}\n  .nav-links a.link::after{display:none;}\n  .nav-links .nav-inline-cta{margin-top:18px;display:block;}\n  .nav-links .nav-inline-cta .btn{width:100%;justify-content:center;}\n  .nav-cta .btn-primary{display:none;}\n  .nav-toggle{display:flex;}\n  .nav-toggle.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}\n  .nav-toggle.open span:nth-child(2){opacity:0;}\n  .nav-toggle.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}\n}\n@media (max-width:760px){\n  body{font-size:16px;}\n  .nav-links{position:fixed;inset:104px 0 auto 0;background:rgba(245,248,244,.97);backdrop-filter:blur(16px);flex-direction:column;align-items:stretch;gap:0;padding:12px var(--gutter) 28px;border-bottom:1px solid var(--line);transform:translateY(-12px);opacity:0;pointer-events:none;transition:.25s;box-shadow:var(--shadow-sm);}\n  .nav-links.open{transform:none;opacity:1;pointer-events:auto;}\n  .nav-links a.link{padding:16px 0;border-bottom:1px solid var(--line-soft);font-size:18px;}\n  .nav-links .nav-inline-cta{margin-top:18px;display:block;}\n  .nav-links .nav-inline-cta .btn{width:100%;justify-content:center;}\n  .nav-cta .btn-primary{display:none;}\n  .nav-toggle{display:flex;}\n  .nav-toggle.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}\n  .nav-toggle.open span:nth-child(2){opacity:0;}\n  .nav-toggle.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}\n  .pillar,.pillar.flip{grid-template-columns:1fr;gap:28px;}\n  .pillar.flip .pillar-media{order:0;}\n  .pillar-media{aspect-ratio:16/10;}\n  .pillars-intro{grid-template-columns:1fr;gap:28px;}\n  .pillars-intro-media{aspect-ratio:16/10;}\n  .hero-stats{grid-template-columns:1fr 1fr;gap:24px;}\n  .impact-grid{grid-template-columns:1fr;}\n  .impact-cell{border-right:none;border-bottom:1px solid var(--line);}\n  .impact-cell:last-child{border-bottom:none;}\n  .process-track{grid-template-columns:1fr;}\n  /* experience table -> stacked cards */\n  .track-table,.track-table tbody,.track-table tr,.track-table td{display:block;width:auto;}\n  .track-table thead{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;}\n  .track-table tr{background:#fff;border:1px solid var(--line);border-radius:var(--r-md);padding:18px 20px;margin-bottom:14px;}\n  .track-table tr:hover{background:#fff;}\n  .track-table td{border-top:none;padding:0;}\n  .track-table td:first-child{padding:0 0 14px;font-size:16.5px;}\n  .track-table td[data-label=\"Sector\"],.track-table td[data-label=\"Geography\"]{display:flex;align-items:center;justify-content:space-between;gap:16px;padding-top:12px;border-top:1px solid var(--line-soft);}\n  .track-table td[data-label=\"Sector\"]::before,.track-table td[data-label=\"Geography\"]::before{content:attr(data-label);font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);}\n  .track-meta{gap:14px 28px;}\n  .footer-top{grid-template-columns:1fr;gap:32px;}\n  .footer-bottom{flex-direction:column;align-items:flex-start;}\n}\n\n/* ---------- mission: vision block ---------- */\n.mission .vision{margin-top:26px;padding:20px 24px;border-left:3px solid var(--green);background:rgba(112,191,112,.08);border-radius:0 var(--r-sm) var(--r-sm) 0;}\n.mission .vision .vision-k{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--emerald);display:block;margin-bottom:8px;}\n.mission .vision p{font-family:var(--display);font-weight:600;font-size:clamp(17px,1.9vw,20px);line-height:1.32;color:var(--forest);letter-spacing:-.01em;}\n\n/* ---------- about us ---------- */\n.about{background:var(--paper-2);}\n.about .es-row{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:clamp(36px,5vw,52px);}\n.es{background:#fff;border:1px solid var(--line);border-radius:var(--r-md);padding:26px;}\n.es-k{font-family:var(--display);font-weight:700;font-size:20px;color:var(--forest);display:block;margin-bottom:10px;}\n.es p{font-size:15px;color:var(--slate);}\n.founders{display:grid;grid-template-columns:1fr 1fr;gap:clamp(22px,3.5vw,36px);margin-top:clamp(40px,6vw,64px);}\n.founder{display:flex;gap:24px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:28px;box-shadow:var(--shadow-sm);}\n.founder-photo{flex:none;width:112px;height:112px;border-radius:50%;overflow:hidden;background:var(--mint);box-shadow:0 8px 24px -14px rgba(12,40,32,.5);}\n.founder-photo img{width:100%;height:100%;object-fit:cover;display:block;}\n.founder-photo--grey img{filter:grayscale(100%);}\n.founder-body h3{font-size:22px;color:var(--forest);}\n.founder-body .role{font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--emerald);display:block;margin:6px 0 14px;}\n.founder-body p{font-size:14.5px;color:var(--slate);line-height:1.6;}\n.values{margin-top:clamp(48px,7vw,72px);}\n.values-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:24px;}\n.value{padding:22px;border:1px solid var(--line);border-radius:var(--r-md);background:#fff;}\n.value h4{font-size:16.5px;font-family:var(--display);color:var(--forest);margin-bottom:8px;}\n.value p{font-size:14px;color:var(--slate);}\n\n/* ---------- about responsive ---------- */\n@media (max-width:1080px){\n  .about .es-row,.about .values-grid{grid-template-columns:1fr 1fr;}\n  .founders{grid-template-columns:1fr;}\n}\n@media (max-width:640px){\n  .blog-grid{grid-template-columns:1fr;}\n  .about .es-row,.about .values-grid{grid-template-columns:1fr;}\n  .founder{flex-direction:column;align-items:flex-start;}\n}\n\n/* ---------- header brand: keep on one line on small screens ---------- */\n.site-header .brand .wordmark{white-space:nowrap;}\n@media (max-width:760px){\n  .nav{height:88px;}\n  .site-header .brand img{height:52px;}\n  .site-header .brand .wordmark{font-size:19px;}\n  .nav-links{inset:88px 0 auto 0;}\n  .hero{padding-top:88px;}\n}\n\n.reveal{opacity:1!important;transform:none!important;}html{scroll-behavior:auto;}body{overflow-x:hidden;}\n.article{padding-top:40px!important;}\n\u003c/style>\n\u003c/head>\n\u003cbody>\n\n\u003c!-- ============ HEADER ============ -->\n\n\n\u003cmain id=\"top\">\n\n  \u003c!-- ============ ARTICLE ============ -->\n  \u003carticle class=\"article\">\n    \u003cdiv class=\"wrap\">\n      \u003ca class=\"article-back\" href=\"../blog.html\">\u003cspan class=\"arr-l\">\u2190\u003c/span> All posts\u003c/a>\n\n      \u003cheader class=\"article-head reveal\">\n        \u003cspan class=\"post-cat-inline\">Policy &amp; Markets\u003c/span>\n        \u003ch1 class=\"article-title\">2026 is the year Canada's clean fuel rules get real, and ownership will decide who benefits\u003c/h1>\n        \u003cdiv class=\"article-meta\">\n          \u003cspan>By Solum Energy\u003c/span>\n          \u003cspan aria-hidden=\"true\">\u00b7\u003c/span>\n          \u003ctime datetime=\"2026-06-28\">June 28, 2026\u003c/time>\n          \u003cspan aria-hidden=\"true\">\u00b7\u003c/span>\n          \u003cspan>4 min read\u003c/span>\n        \u003c/div>\n      \u003c/header>\n\n      \u003cfigure class=\"article-hero reveal\" data-d=\"1\">\n        \u003csvg style=\"width:100%;height:auto;display:block\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 1000 563\" font-family=\"'Hanken Grotesk','Schibsted Grotesk',Arial,sans-serif\">\n  \u003crect width=\"1000\" height=\"563\" fill=\"#f5f8f4\"/>\n  \u003c!-- title block -->\n  \u003ctext x=\"70\" y=\"78\" font-size=\"34\" font-weight=\"700\" fill=\"#1a3d35\" letter-spacing=\"-0.5\">Canada's RNG capacity is set to triple\u003c/text>\n  \u003ctext x=\"70\" y=\"110\" font-size=\"18\" fill=\"#516159\">Registered renewable natural gas capacity, petajoules (PJ)\u003c/text>\n\n  \u003c!-- baseline -->\n  \u003cline x1=\"70\" y1=\"470\" x2=\"930\" y2=\"470\" stroke=\"#d6e2d6\" stroke-width=\"2\"/>\n\n  \u003c!-- gridline -->\n  \u003cline x1=\"70\" y1=\"300\" x2=\"930\" y2=\"300\" stroke=\"#eef4ec\" stroke-width=\"1.5\"/>\n  \u003cline x1=\"70\" y1=\"185\" x2=\"930\" y2=\"185\" stroke=\"#eef4ec\" stroke-width=\"1.5\"/>\n\n  \u003c!-- Bar 2023: 9.3 PJ -> height 105 -->\n  \u003crect x=\"300\" y=\"365\" width=\"150\" height=\"105\" rx=\"6\" fill=\"#2f7f60\"/>\n  \u003ctext x=\"375\" y=\"345\" font-size=\"30\" font-weight=\"700\" fill=\"#1a3d35\" text-anchor=\"middle\">9.3 PJ\u003c/text>\n  \u003ctext x=\"375\" y=\"505\" font-size=\"19\" font-weight=\"600\" fill=\"#516159\" text-anchor=\"middle\">2023\u003c/text>\n\n  \u003c!-- Bar 2026: 28.9 PJ -> height 325 -->\n  \u003crect x=\"600\" y=\"145\" width=\"150\" height=\"325\" rx=\"6\" fill=\"#1a3d35\"/>\n  \u003ctext x=\"675\" y=\"125\" font-size=\"30\" font-weight=\"700\" fill=\"#1a3d35\" text-anchor=\"middle\">28.9 PJ\u003c/text>\n  \u003ctext x=\"675\" y=\"505\" font-size=\"19\" font-weight=\"600\" fill=\"#516159\" text-anchor=\"middle\">2026 (projected)\u003c/text>\n\n  \u003c!-- growth annotation -->\n  \u003cg>\n    \u003crect x=\"772\" y=\"232\" width=\"158\" height=\"46\" rx=\"23\" fill=\"#70bf70\" fill-opacity=\"0.18\"/>\n    \u003ctext x=\"851\" y=\"262\" font-size=\"22\" font-weight=\"700\" fill=\"#2f7f60\" text-anchor=\"middle\">+210%\u003c/text>\n  \u003c/g>\n\n  \u003c!-- source -->\n  \u003ctext x=\"70\" y=\"548\" font-size=\"13\" fill=\"#8a9690\">Source: Canadian Gas Association projection, registered under Canada's Clean Fuel Regulations.\u003c/text>\n\u003c/svg>\n\n      \u003c/figure>\n\n      \u003cdiv class=\"article-body reveal\" data-d=\"1\">\n        \u003cp class=\"article-lead\">The Clean Fuel Regulations just crossed the line from \"build credits when you can\" to \"deliver real, incremental low-carbon fuel, now.\" That shift is reshaping where capital flows, and the communities that own the projects are the ones positioned to win.\u003c/p>\n\n        \u003cp>For the first three years of Canada's Clean Fuel Regulations (CFR), fuel suppliers could lean heavily on banked credits to meet their obligations. That cushion is gone. 2026 is the \u003ca href=\"https://www.ccarbon.info/article/unlocking-the-future-of-canadas-clean-fuel-market-policy-shifts-market-insights-and-near-term-projections/\">first compliance year that requires \"incremental\" credit creation\u003c/a>, meaning the easy baseline credits have run out and six new fuel pathways are now needed just to keep the market in balance. In plain terms, the regulation has stopped rewarding intentions and started demanding molecules.\u003c/p>\n\n        \u003cp>That is a profound change in the kind of project that gets financed. When credits were abundant, a developer could promise future low-carbon fuel and trade on the paper. Now the value sits with whoever can actually produce renewable natural gas, green hydrogen, or low-carbon methanol and put it into the system. Production beats promises, and production happens on the land, in the communities Solum is built to serve.\u003c/p>\n\n        \u003ch2>The demand signal is now backed by dollars\u003c/h2>\n        \u003cp>Policy without money is a wish. This year it comes with both. Starting in January 2026, a \u003ca href=\"https://www.wastedive.com/news/canada-cfr-amendment-comments-rng-coalition/811811/\">370 million dollar federal biofuel production incentive\u003c/a> began flowing to Canadian biodiesel and renewable diesel producers, paired with proposed CFR amendments that would create longer-term demand for domestically produced fuel, likely through domestic-content requirements or a credit multiplier. After a consultation that ran through January, Ottawa is signalling clearly that it wants the fuel made here, not imported.\u003c/p>\n\n        \u003cp>The market has already responded. RNG was the standout performer under the regulation, with registered volumes climbing 417 percent in a single year and capacity on track to roughly triple between 2023 and 2026, as the chart above shows. For a developer turning forestry and agricultural residue into RNG and methanol, feedstock that would otherwise rot or burn, the regulatory and financial tailwinds are now pointing the same direction at the same time.\u003c/p>\n\n        \u003cblockquote>When credits were easy, the winners were the fastest traders. Now that fuel has to be real, the winners are the people who can build and run the plant, and keep the value where the feedstock grows.\u003c/blockquote>\n\n        \u003ch2>Indigenous ownership has moved from principle to balance sheet\u003c/h2>\n        \u003cp>The most underreported shift in Canadian energy is who owns it. First Nations and Indigenous communities are now \u003ca href=\"https://indigenouscleanenergy.com/regenerative-energy-national-survey-2026/\">the third-largest collective owners of clean energy assets in the country\u003c/a>, behind only government and large utilities. This is not a symbolic stake. In British Columbia, BC Hydro's latest call for power advanced four renewable projects in which First Nations hold \u003ca href=\"https://news.gov.bc.ca/releases/2026ECS0014-000552\">51 percent equity, more than 2 billion dollars of ownership\u003c/a>.\u003c/p>\n\n        \u003cp>That is the model proving out in real time. Not consultation, not a seat at someone else's table, but majority equity, shared governance, and revenue that stays in the community. It is exactly the structure Solum builds around, co-ownership from the first conversation to the final return, and the 2026 data shows it is now the direction the whole sector is moving, not a niche experiment.\u003c/p>\n\n        \u003ch2>What it means for the next project\u003c/h2>\n        \u003cp>Put the three threads together and the picture is clear. The CFR now rewards fuel you can actually deliver. Federal money is backing domestic production specifically. And the ownership model that keeps value in host communities has gone from aspiration to multi-billion-dollar reality. The projects best positioned for this moment are the ones that can produce a real low-carbon molecule, on partnered land, with the community as a co-owner rather than a bystander.\u003c/p>\n\n        \u003cp>That is the thesis Solum was founded on, green hydrogen, RNG, and biomass methanol developed with First Nations as true co-owners, from seeding to operations. In 2026, the policy and the capital finally caught up to it. The question for every developer, investor, and community this year is no longer whether clean fuel will be built in Canada. It is who will own it.\u003c/p>\n\n        \u003ch2>Sources\u003c/h2>\n        \u003cul>\n          \u003cli>CCarbon, \u003ca href=\"https://www.ccarbon.info/article/unlocking-the-future-of-canadas-clean-fuel-market-policy-shifts-market-insights-and-near-term-projections/\">Unlocking the Future of Canada's Clean Fuel Market\u003c/a>\u003c/li>\n          \u003cli>Waste Dive, \u003ca href=\"https://www.wastedive.com/news/canada-cfr-amendment-comments-rng-coalition/811811/\">Canada explores protectionist biofuel policies\u003c/a>\u003c/li>\n          \u003cli>Waste Dive, \u003ca href=\"https://www.wastedive.com/news/canada-clean-fuels-market-rng-increase/757558/\">Canada's clean fuel program sees 417 percent jump in RNG\u003c/a>\u003c/li>\n          \u003cli>Indigenous Clean Energy, \u003ca href=\"https://indigenouscleanenergy.com/regenerative-energy-national-survey-2026/\">Regenerative Energy National Survey 2026\u003c/a>\u003c/li>\n          \u003cli>Province of B.C., \u003ca href=\"https://news.gov.bc.ca/releases/2026ECS0014-000552\">Strong response to 2025 call for power\u003c/a>\u003c/li>\n        \u003c/ul>\n      \u003c/div>\n\n      \u003cdiv class=\"article-foot reveal\" data-d=\"2\">\n        \u003ca class=\"btn btn-primary\" href=\"https://forms.office.com/Pages/ResponsePage.aspx?id=vCMz4rcbukWS799uzktcoOvDG3h3Hd9Ium23QADs16ZUMlZIQllWRDBNREpORU1ZQzRVN0s2WlNFTy4u\" target=\"_blank\" rel=\"noopener\">Partner With Us \u003cspan class=\"arr\">\u2192\u003c/span>\u003c/a>\n        \u003ca class=\"btn btn-ghost\" href=\"../blog.html\">Back to blog\u003c/a>\n      \u003c/div>\n    \u003c/div>\n  \u003c/article>\n\n\u003c/main>\n\n\u003c!-- ============ FOOTER ============ -->\n\n\n\n\u003c/body>\n\u003c/html>\n"}];
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function render(){
  const host=document.getElementById('posts');
  document.getElementById('count').textContent=POSTS.length+(POSTS.length===1?' post':' posts')+' tracked';
  host.innerHTML=POSTS.map((p,i)=>{
    const src=p.sources.map(s=> s.url
      ? '<li><a href="'+esc(s.url)+'" target="_blank" rel="noopener">'+esc(s.label)+'</a></li>'
      : '<li>'+esc(s.label)+'</li>').join('');
    const st = (localStorage.getItem('solum-status-'+p.slug) === 'posted') ? 'posted' : 'draft';
    return `
    <div class="card">
      <button class="status" data-state="${st}" data-slug="${esc(p.slug)}" title="Click to toggle"><span class="dot"></span><span class="lbl">${st==='posted'?'Posted':'Draft'}</span></button>
      <div class="meta">
        <span class="cat">${esc(p.category)}</span>
        ${p.test?'<span class="test-tag">Test post</span>':''}
        <span class="mono">${esc(p.date)}</span>
      </div>
      <h2>${esc(p.title)}</h2>
      <p class="summary">${esc(p.summary)}</p>
      <div class="actions">
        <button class="btn btn-primary" data-prev="${i}">Preview blog &rarr;</button>
      </div>
      <details>
        <summary><span class="chev">&#9656;</span> LinkedIn executive summary</summary>
        <div class="li-box"><button class="copy" data-i="${i}">Copy</button><p class="li-text">${esc(p.linkedin)}</p></div>
      </details>
      <details>
        <summary><span class="chev">&#9656;</span> Sources (${p.sources.length})</summary>
        <ul class="src">${src}</ul>
      </details>
    </div>`;
  }).join('');
  document.querySelectorAll('[data-prev]').forEach(b=>b.addEventListener('click',()=>openPrev(+b.getAttribute('data-prev'))));
  document.querySelectorAll('.status').forEach(btn=>btn.addEventListener('click',()=>{
    const next = btn.getAttribute('data-state')==='posted' ? 'draft' : 'posted';
    btn.setAttribute('data-state',next);
    btn.querySelector('.lbl').textContent = next==='posted' ? 'Posted' : 'Draft';
    try{ localStorage.setItem('solum-status-'+btn.getAttribute('data-slug'), next); }catch(e){}
  }));
  document.querySelectorAll('.copy').forEach(btn=>btn.addEventListener('click',()=>{
    const t=POSTS[btn.getAttribute('data-i')].linkedin;
    const done=()=>{btn.textContent='Copied';btn.classList.add('done');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('done');},1600);};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(done).catch(()=>fb(t,done));}else{fb(t,done);}
  }));
}
function fb(t,done){const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();try{document.execCommand('copy');done();}catch(e){}document.body.removeChild(a);}
const modal=document.getElementById('modal'),frame=document.getElementById('modal-frame'),mtitle=document.getElementById('modal-title');
function openPrev(i){mtitle.textContent=POSTS[i].title;frame.srcdoc=POSTS[i].preview;modal.classList.add('open');}
function closePrev(){modal.classList.remove('open');frame.srcdoc='';}
document.getElementById('modal-close').addEventListener('click',closePrev);
modal.addEventListener('click',e=>{if(e.target===modal)closePrev();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePrev();});
render();
</script>
